<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#060c1a"/>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="220" r="180" fill="url(#glow)"/>
  <!-- 导航指南针 -->
  <circle cx="256" cy="230" r="130" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <circle cx="256" cy="230" r="90" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <!-- 指针 -->
  <polygon points="256,120 270,230 256,210 242,230" fill="url(#g1)"/>
  <polygon points="256,340 270,230 256,250 242,230" fill="rgba(255,255,255,0.2)"/>
  <circle cx="256" cy="230" r="14" fill="url(#g1)"/>
  <circle cx="256" cy="230" r="8" fill="#060c1a"/>
  <!-- 文字 -->
  <text x="256" y="408" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="68" font-weight="900" fill="url(#g1)" letter-spacing="-2">智航</text>
  <text x="256" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="700" fill="rgba(255,255,255,0.4)" letter-spacing="4">PRO</text>
</svg>
