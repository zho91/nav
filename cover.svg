<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="400" viewBox="0 0 1440 400">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#db2777" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#db2777" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="400" fill="#060c1a"/>

  <!-- Aurora blobs -->
  <ellipse cx="200" cy="150" rx="420" ry="320" fill="url(#blob1)" filter="url(#blur1)"/>
  <ellipse cx="1280" cy="280" rx="380" ry="300" fill="url(#blob2)" filter="url(#blur2)"/>
  <ellipse cx="780" cy="380" rx="300" ry="240" fill="url(#blob3)" filter="url(#blur2)"/>

  <!-- Dot grid overlay -->
  <pattern id="dots" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.025)"/>
  </pattern>
  <rect width="1440" height="400" fill="url(#dots)"/>

  <!-- Compass icon group (left side) -->
  <g transform="translate(200,200)">
    <circle r="90" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
    <circle r="62" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <!-- North pointer -->
    <polygon points="0,-70 10,0 0,-16 -10,0" fill="url(#logoGrad)"/>
    <!-- South pointer -->
    <polygon points="0,70 10,0 0,16 -10,0" fill="rgba(255,255,255,0.18)"/>
    <!-- Center dot -->
    <circle r="10" fill="url(#logoGrad)"/>
    <circle r="5" fill="#060c1a"/>
    <!-- Cardinal ticks -->
    <line x1="0" y1="-95" x2="0" y2="-88" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="0" y1="88" x2="0" y2="95" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="-95" y1="0" x2="-88" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="88" y1="0" x2="95" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  </g>

  <!-- Main text block (center) -->
  <text x="720" y="148" text-anchor="middle"
        font-family="-apple-system,system-ui,sans-serif"
        font-size="82" font-weight="900" letter-spacing="-3"
        fill="url(#logoGrad)" filter="drop-shadow(0 0 30px rgba(139,92,246,0.5))">智航 PRO</text>

  <text x="720" y="192" text-anchor="middle"
        font-family="-apple-system,system-ui,sans-serif"
        font-size="22" font-weight="400" letter-spacing="5"
        fill="rgba(148,163,184,0.85)">你的高效起点 · 聚合全网精选</text>

  <!-- Feature chips -->
  <g transform="translate(720,240)" text-anchor="middle"
     font-family="-apple-system,system-ui,sans-serif" font-size="15" font-weight="600">

    <!-- Chip 1 -->
    <rect x="-322" y="0" width="140" height="34" rx="10"
          fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <text x="-252" y="22" fill="rgba(196,181,253,0.9)">🤖 13 个 AI 工具</text>

    <!-- Chip 2 -->
    <rect x="-164" y="0" width="140" height="34" rx="10"
          fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <text x="-94" y="22" fill="rgba(196,181,253,0.9)">🛡 11 免费 VPN</text>

    <!-- Chip 3 -->
    <rect x="-6" y="0" width="140" height="34" rx="10"
          fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <text x="64" y="22" fill="rgba(196,181,253,0.9)">🧰 内置工具箱</text>

    <!-- Chip 4 -->
    <rect x="152" y="0" width="158" height="34" rx="10"
          fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <text x="231" y="22" fill="rgba(196,181,253,0.9)">📦 100+ 精选站点</text>
  </g>

  <!-- CTA button -->
  <rect x="620" y="304" width="200" height="44" rx="13" fill="url(#btnGrad)"/>
  <text x="720" y="332" text-anchor="middle"
        font-family="-apple-system,system-ui,sans-serif"
        font-size="17" font-weight="700" fill="#fff" letter-spacing="1">❤ 支持作者</text>

  <!-- URL badge bottom right -->
  <text x="1400" y="380" text-anchor="end"
        font-family="-apple-system,system-ui,sans-serif"
        font-size="16" fill="rgba(148,163,184,0.4)" letter-spacing="1">afdian.com/a/zhihangpro</text>

  <!-- Version badge top right -->
  <rect x="1340" y="20" width="80" height="26" rx="8"
        fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="1380" y="38" text-anchor="middle"
        font-family="-apple-system,system-ui,sans-serif"
        font-size="13" font-weight="700" fill="rgba(139,92,246,0.9)">v5.0 Pro</text>
</svg>
