name: Update Hot Search
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch hot search data
        run: |
          mkdir -p data
          curl -sf "https://tenapi.cn/v2/weibohot" -o data/wb.json || \
            curl -sf "https://api.vvhan.com/api/hotlist?type=wbHot" -o data/wb.json || \
            echo '{"code":0}' > data/wb.json

          curl -sf "https://tenapi.cn/v2/zhihuhot" -o data/zh.json || \
            curl -sf "https://api.vvhan.com/api/hotlist?type=zhihuHot" -o data/zh.json || \
            echo '{"code":0}' > data/zh.json

          curl -sf "https://tenapi.cn/v2/baiduhot" -o data/bd.json || \
            curl -sf "https://api.vvhan.com/api/hotlist?type=baiduHot" -o data/bd.json || \
            echo '{"code":0}' > data/bd.json

          curl -sf "https://tenapi.cn/v2/toutiaohot" -o data/tt.json || \
            curl -sf "https://api.vvhan.com/api/hotlist?type=toutiaoNews" -o data/tt.json || \
            echo '{"code":0}' > data/tt.json

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || git commit -m "chore: update hot search data"
          git push origin main
