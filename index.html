<style>
:root{--bg:#060c1a;--card:rgba(255,255,255,.05);--hov:rgba(255,255,255,.09);--bd:rgba(255,255,255,.08);--bdhov:rgba(139,92,246,.5);--txt:#f1f5f9;--dim:#94a3b8;--pu:#8b5cf6;--pk:#ec4899;--gr:#10b981;--rd:#ef4444;--yw:#f59e0b;--glow:rgba(139,92,246,.25)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:-apple-system,system-ui,sans-serif;overflow-x:hidden}
/* aurora */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 30s infinite ease-in-out}
.ab1{width:600px;height:600px;background:radial-gradient(circle,#7c3aed,#4f46e5);top:-150px;left:-100px;opacity:.12;animation-duration:28s}
.ab2{width:500px;height:500px;background:radial-gradient(circle,#db2777,#be185d);bottom:-120px;right:-100px;opacity:.10;animation-duration:36s;animation-delay:-14s}
.ab3{width:350px;height:350px;background:radial-gradient(circle,#2563eb,#0ea5e9);top:45%;left:50%;opacity:.08;animation-duration:42s;animation-delay:-7s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,30px) scale(1.07)}66%{transform:translate(-30px,50px) scale(.95)}}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.02) 1px,transparent 1px);background-size:26px 26px}
.wrap{position:relative;z-index:1}
/* topbar */
.topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 22px 0;max-width:1280px;margin:0 auto}
.clock-blk{}
#clock{font-size:26px;font-weight:800;letter-spacing:3px;font-variant-numeric:tabular-nums;background:linear-gradient(120deg,#c4b5fd,#f9a8d4,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;line-height:1.2}
#datestr{font-size:12px;color:var(--dim);margin-top:2px;display:block}
#greet{font-size:13px;color:var(--dim)}
.ver{font-size:11px;padding:3px 9px;border-radius:8px;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.2);color:var(--pu);font-weight:700}
/* header */
.hdr{text-align:center;padding:28px 20px 14px}
.logo{font-size:52px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#c4b5fd,#f9a8d4,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;animation:logoGlow 4s ease-in-out infinite}
.tagline{font-size:14px;color:var(--dim);margin-top:0;letter-spacing:2px;font-weight:500}
.chips{display:flex;gap:7px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 11px;border-radius:20px;background:var(--card);border:1px solid var(--bd);color:var(--dim)}
.chip b{color:var(--pu)}
/* search */
.srch-wrap{position:sticky;top:0;z-index:100;padding:10px 22px 12px;background:linear-gradient(to bottom,rgba(6,12,26,.97) 60%,transparent);backdrop-filter:blur(20px)}
.sbox{max-width:680px;margin:0 auto;position:relative}
.sbox input{width:100%;background:rgba(15,23,42,.88);border:1.5px solid var(--bd);border-radius:18px;padding:13px 48px 13px 50px;color:var(--txt);font-size:16px;outline:none;transition:border-color .25s,box-shadow .25s;font-family:inherit}
.sbox input:focus{border-color:var(--pu);box-shadow:0 0 0 4px var(--glow)}
.sbox input::placeholder{color:rgba(148,163,184,.38)}
.sico{position:absolute;left:17px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.4;cursor:pointer;background:none;border:none;padding:0;transition:opacity .2s}
.sico:hover{opacity:.8}
.sclr{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:var(--dim);cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center}
.sclr.on{display:flex}
.sclr:hover{background:rgba(255,255,255,.16);color:var(--txt)}
.engrow{display:flex;gap:5px;justify-content:center;margin-top:9px;flex-wrap:wrap}
.ebtn{font-size:12px;padding:4px 12px;border-radius:8px;background:var(--card);border:1px solid var(--bd);color:var(--dim);cursor:pointer;font-family:inherit;transition:.2s}
.ebtn.on{background:linear-gradient(135deg,var(--pu),var(--pk));color:#fff;border-color:transparent}
.ebtn:hover:not(.on){border-color:rgba(139,92,246,.4);color:var(--txt)}
/* toolbar */
.tbar{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 22px 5px;flex-wrap:wrap;gap:5px}
.tgrp{display:flex;gap:5px;flex-wrap:wrap}
.tbtn{font-size:12px;padding:6px 12px;border-radius:9px;background:var(--card);border:1px solid var(--bd);color:var(--dim);cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;gap:4px}
.tbtn:hover{background:var(--hov);color:var(--txt);border-color:var(--bdhov)}
.tbtn.on{background:rgba(139,92,246,.14);color:var(--pu);border-color:rgba(139,92,246,.3)}
/* pills */
.pillwrap{max-width:1280px;margin:0 auto;padding:3px 22px 14px;overflow-x:auto;scrollbar-width:none}
.pillwrap::-webkit-scrollbar{display:none}
.pills{display:flex;gap:6px;width:max-content}
.pill{flex-shrink:0;padding:6px 14px;border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);border:1px solid var(--bd);color:var(--dim);font-family:inherit;white-space:nowrap;transition:.2s;display:flex;align-items:center;gap:5px}
.pill .cn{font-size:10px;background:rgba(255,255,255,.08);padding:1px 5px;border-radius:8px;font-weight:700}
.pill.on{background:linear-gradient(135deg,var(--pu),var(--pk));color:#fff;border-color:transparent;box-shadow:0 3px 16px var(--glow)}
.pill.on .cn{background:rgba(255,255,255,.2)}
.pill:hover:not(.on){border-color:rgba(139,92,246,.4);color:var(--txt)}
/* rstats */
.rst{max-width:1280px;margin:0 auto 3px;padding:0 22px;font-size:12px;color:var(--dim);min-height:16px}
/* main */
.main{max-width:1280px;margin:0 auto;padding:0 22px 110px}
.sec-hd{display:flex;align-items:center;gap:9px;padding-top:20px;margin-bottom:11px}
.sec-t{font-size:11px;font-weight:800;color:var(--pu);text-transform:uppercase;letter-spacing:2px;white-space:nowrap}
.sec-ln{flex:1;height:1px;background:linear-gradient(to right,rgba(139,92,246,.3),transparent)}
.sec-n{font-size:11px;color:var(--dim);background:var(--card);border:1px solid var(--bd);padding:1px 7px;border-radius:9px;flex-shrink:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:10px;margin-bottom:5px}
/* list mode */
.list .grid{grid-template-columns:1fr}
.list .scard{flex-direction:row;align-items:center;gap:12px;padding:11px 14px;border-radius:14px}
.list .sico2{margin-bottom:0;flex-shrink:0;width:40px;height:40px;font-size:19px}
.list .sinf{flex:1;min-width:0}
.list .sdesc{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;-webkit-line-clamp:unset}
/* card */
.scard{background:var(--card);border:1px solid var(--bd);border-radius:18px;padding:14px 14px 13px;text-decoration:none;display:flex;flex-direction:column;align-items:flex-start;position:relative;overflow:hidden;transition:transform .3s cubic-bezier(.175,.885,.32,1.275),background .22s,border-color .22s,box-shadow .22s;animation:fup .45s cubic-bezier(.34,1.56,.64,1) both}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cc,#8b5cf6) 0%,transparent 70%);border-radius:18px 18px 0 0;opacity:.9}
.scard::after{content:'';position:absolute;inset:0;border-radius:18px;background:linear-gradient(135deg,var(--cc,#8b5cf6),transparent);opacity:.04;pointer-events:none}
@keyframes fup{from{opacity:0;transform:translateY(22px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.scard:hover{background:var(--hov);border-color:var(--cc,rgba(139,92,246,.4));transform:translateY(-5px) scale(1.02);box-shadow:0 18px 42px rgba(0,0,0,.55),0 0 24px var(--glow)}
.sico2{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:11px;flex-shrink:0;transition:.22s}
.scard:hover .sico2{filter:brightness(1.25);box-shadow:0 0 12px var(--cc,var(--glow))}
.sico2 img{width:28px;height:28px;object-fit:contain;border-radius:6px}
.sname{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:4px;line-height:1.3}
.sdesc{font-size:11px;color:var(--dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.stag{font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;position:absolute;top:9px;right:9px;letter-spacing:.7px}
.th{background:rgba(239,68,68,.18);color:#f87171;border:1px solid rgba(248,113,113,.22)}
.tn{background:rgba(16,185,129,.18);color:#34d399;border:1px solid rgba(52,211,153,.22)}
.tf{background:rgba(59,130,246,.18);color:#60a5fa;border:1px solid rgba(96,165,250,.22)}
em.hl{font-style:normal;color:#f472b6;background:rgba(244,114,182,.12);padding:0 2px;border-radius:3px}
.empty{text-align:center;padding:70px 20px;color:var(--dim)}
.empty .big{font-size:44px;margin-bottom:10px}
/* TOOLBOX */
.tbx{position:fixed;top:0;right:-350px;width:320px;height:100vh;z-index:500;background:rgba(8,14,26,.97);border-left:1px solid var(--bd);backdrop-filter:blur(22px);display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-18px 0 50px rgba(0,0,0,.6)}
.tbx.open{right:0}
.tbx-hd{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tbx-title{font-size:14px;font-weight:700;color:var(--txt)}
.tbx-x{width:28px;height:28px;border-radius:7px;background:var(--card);border:1px solid var(--bd);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.tbx-x:hover{background:var(--hov);color:var(--txt)}
.ttabs{display:flex;gap:3px;padding:10px 16px 0;flex-shrink:0}
.ttab{flex:1;padding:7px 0;border-radius:9px;font-size:11px;font-weight:600;background:var(--card);border:1px solid var(--bd);color:var(--dim);cursor:pointer;text-align:center;font-family:inherit;transition:.2s}
.ttab.on{background:linear-gradient(135deg,var(--pu),var(--pk));color:#fff;border-color:transparent}
.ttab:hover:not(.on){color:var(--txt);border-color:var(--bdhov)}
.tbody{flex:1;overflow-y:auto;padding:14px 16px;scrollbar-width:thin;scrollbar-color:rgba(139,92,246,.25) transparent}
.tbody::-webkit-scrollbar{width:3px}
.tbody::-webkit-scrollbar-thumb{background:rgba(139,92,246,.25);border-radius:3px}
.tpanel{display:none}
.tpanel.on{display:block}
/* note */
.nta{width:100%;min-height:240px;resize:none;background:rgba(15,23,42,.8);border:1.5px solid var(--bd);border-radius:12px;padding:12px;color:var(--txt);font-size:13px;line-height:1.7;font-family:inherit;outline:none;transition:.2s}
.nta:focus{border-color:var(--pu);box-shadow:0 0 0 3px var(--glow)}
.nfooter{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--dim)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gr);display:inline-block;margin-right:4px;animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
/* todo */
.ti-row{display:flex;gap:7px;margin-bottom:11px}
.tinput{flex:1;background:rgba(15,23,42,.8);border:1.5px solid var(--bd);border-radius:11px;padding:9px 12px;color:var(--txt);font-size:13px;font-family:inherit;outline:none;transition:.2s}
.tinput:focus{border-color:var(--pu)}
.tadd{width:36px;height:36px;border-radius:9px;background:var(--pu);border:none;color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tadd:hover{background:#7c3aed}
.tstat{font-size:11px;color:var(--dim);margin-bottom:9px;display:flex;justify-content:space-between}
.tclr{font-size:11px;color:var(--rd);cursor:pointer;background:none;border:none;font-family:inherit}
.tlist{display:flex;flex-direction:column;gap:6px}
.titem{display:flex;align-items:center;gap:9px;background:rgba(15,23,42,.6);border:1px solid var(--bd);border-radius:10px;padding:9px 11px;animation:fup .22s ease}
.titem.done .ttxt{text-decoration:line-through;opacity:.5}
.tck{width:19px;height:19px;border-radius:5px;border:2px solid var(--bd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:#fff}
.titem.done .tck{background:var(--gr);border-color:var(--gr)}
.ttxt{flex:1;font-size:13px;color:var(--txt);word-break:break-word}
.tdel{width:22px;height:22px;border-radius:5px;background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:.15s}
.titem:hover .tdel{opacity:1}
.tdel:hover{background:rgba(239,68,68,.15);color:var(--rd)}
.tempty{text-align:center;padding:28px;color:var(--dim);font-size:13px}
/* pomo */
.pwrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding-top:6px}
.pmodes{display:flex;gap:5px}
.pmode{padding:5px 13px;border-radius:8px;font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--bd);color:var(--dim);cursor:pointer;font-family:inherit;transition:.2s}
.pmode.on{background:rgba(139,92,246,.2);color:var(--pu);border-color:rgba(139,92,246,.3)}
.pring{position:relative;width:160px;height:160px}
.psvg{transform:rotate(-90deg)}
.ptr{fill:none;stroke:rgba(255,255,255,.06);stroke-width:10}
.pprog{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .95s linear,stroke .4s}
.pctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ptime{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px}
.plbl{font-size:11px;color:var(--dim);margin-top:2px;font-weight:600;letter-spacing:.8px}
.pbtns{display:flex;gap:9px}
.pbtn{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:.2s}
.pstart{background:linear-gradient(135deg,var(--pu),var(--pk));color:#fff}
.pstart:hover{opacity:.9}
.preset{background:var(--card);border:1px solid var(--bd);color:var(--dim)}
.preset:hover{border-color:var(--bdhov);color:var(--txt)}
.pcyc{font-size:12px;color:var(--dim)}
.pcyc b{color:var(--yw)}
/* bookmark */
.bmform{background:rgba(15,23,42,.7);border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:12px}
.bmft{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px}
.bminput{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--bd);border-radius:9px;padding:8px 11px;color:var(--txt);font-size:13px;font-family:inherit;outline:none;margin-bottom:7px;transition:.2s}
.bminput:focus{border-color:var(--pu)}
.bmsave{width:100%;padding:8px;border-radius:9px;background:linear-gradient(135deg,var(--pu),var(--pk));color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.bmsave:hover{opacity:.9}
.bmlist{display:flex;flex-direction:column;gap:6px}
.bmitem{display:flex;align-items:center;gap:8px;background:rgba(15,23,42,.6);border:1px solid var(--bd);border-radius:10px;padding:8px 11px;text-decoration:none;transition:.2s}
.bmitem:hover{background:var(--hov);border-color:var(--bdhov)}
.bmic{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.bmic img{width:17px;height:17px;object-fit:contain;border-radius:3px}
.bminf{flex:1;min-width:0}
.bmn{font-size:13px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bmu{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bmdel{width:20px;height:20px;border-radius:5px;background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0}
.bmitem:hover .bmdel{opacity:1}
.bmdel:hover{background:rgba(239,68,68,.15);color:var(--rd)}
.bmempty{text-align:center;padding:20px;color:var(--dim);font-size:13px}
/* fabs */
.fabs{position:fixed;bottom:24px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:400}
.fab{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:.2s;box-shadow:0 4px 18px rgba(0,0,0,.5);border:none}
.fab1{background:linear-gradient(135deg,var(--pu),var(--pk));color:#fff;position:relative}
.fab1:hover{transform:scale(1.1);box-shadow:0 8px 26px var(--glow)}
.fbadge{position:absolute;top:-3px;right:-3px;width:15px;height:15px;background:var(--rd);border-radius:50%;font-size:9px;font-weight:800;color:#fff;display:none;align-items:center;justify-content:center;border:2px solid var(--bg)}
.fbadge.on{display:flex}
.fab2{background:rgba(15,23,42,.88);color:var(--dim);border:1px solid var(--bd);backdrop-filter:blur(10px)}
.fab2:hover{color:var(--txt)}
/* keyboard hint */
.kbhint{position:fixed;bottom:24px;left:22px;font-size:11px;color:var(--dim);background:rgba(15,23,42,.88);border:1px solid var(--bd);padding:5px 11px;border-radius:9px;backdrop-filter:blur(12px);z-index:200}
kbd{font-size:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:1px 4px;border-radius:3px;font-family:monospace;margin:0 2px}
/* toast */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(15,23,42,.97);border:1px solid var(--bd);padding:9px 20px;border-radius:12px;font-size:13px;color:var(--txt);backdrop-filter:blur(14px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.5)}
.toast.on{transform:translateX(-50%) translateY(0)}
/* overlay */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:499;display:none}
.ovl.on{display:block}
/* install banner */
.ibanner{position:fixed;bottom:0;left:0;right:0;z-index:600;padding:13px 18px;background:rgba(8,14,26,.98);border-top:1px solid rgba(139,92,246,.3);backdrop-filter:blur(18px);display:flex;align-items:center;gap:12px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.ibanner.show{transform:translateY(0)}
.iico{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--pu),var(--pk));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.itxt{flex:1}
.itxt strong{display:block;font-size:14px;font-weight:700;color:var(--txt)}
.itxt span{font-size:12px;color:var(--dim)}
.ibtn{padding:8px 16px;border-radius:10px;background:linear-gradient(135deg,var(--pu),var(--pk));color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:inherit}
.idis{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:none;color:var(--dim);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* ── VPN affiliate promo ── */
.vpnsec{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(236,72,153,.05));border:1px solid rgba(139,92,246,.2);border-radius:18px;padding:16px 16px 14px;margin-bottom:20px}
.vpnsec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;flex-wrap:wrap;gap:6px}
.vpnsec-t{font-size:11px;font-weight:800;color:var(--pu);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.vpnsec-badge{font-size:9px;background:linear-gradient(135deg,var(--pu),var(--pk));color:#fff;padding:2px 7px;border-radius:5px;font-weight:800;letter-spacing:.5px}
.vpnsec-sub{font-size:11px;color:var(--dim)}
.vpncards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px}
.vpncard{background:rgba(10,18,38,.8);border:1px solid rgba(139,92,246,.15);border-radius:13px;padding:13px;display:flex;flex-direction:column;gap:9px;transition:.22s;position:relative;overflow:hidden;text-decoration:none}
.vpncard:hover{border-color:rgba(139,92,246,.5);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.5),0 0 18px var(--glow)}
.vpncard-top{display:flex;align-items:center;gap:10px}
.vpnic2{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.vpnname{font-size:13px;font-weight:700;color:var(--txt);line-height:1.2}
.vpnstars{font-size:11px;color:var(--yw);margin-top:2px;letter-spacing:.8px}
.vpntags{display:flex;gap:5px;flex-wrap:wrap}
.vtag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.vtag-a{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.vtag-b{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.vtag-c{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.vpnprice{display:flex;align-items:baseline;gap:5px}
.vpnp{font-size:20px;font-weight:900;color:var(--txt);line-height:1}
.vpnpu{font-size:11px;color:var(--dim)}
.vpnpo{font-size:12px;color:var(--dim);text-decoration:line-through}
.vpncta{display:block;padding:8px;border-radius:9px;background:linear-gradient(135deg,var(--pu),var(--pk));color:#fff;font-size:12px;font-weight:700;text-align:center;text-decoration:none;transition:.18s}
.vpncta:hover{opacity:.88}
.vpndisc{position:absolute;top:9px;right:9px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;background:var(--rd);color:#fff;letter-spacing:.4px}
.support-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;background:linear-gradient(135deg,rgba(236,72,153,.13),rgba(139,92,246,.13));border:1px solid rgba(236,72,153,.28);color:#f9a8d4;font-size:12px;font-weight:700;text-decoration:none;transition:.2s;margin-top:9px}
.support-btn:hover{background:linear-gradient(135deg,rgba(236,72,153,.25),rgba(139,92,246,.25));border-color:rgba(236,72,153,.5);transform:scale(1.04)}
/* Search history */
.sbox{position:relative}
.srec{position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(8,14,26,.98);border:1px solid var(--bd);border-radius:14px;padding:11px 13px;z-index:200;backdrop-filter:blur(22px);display:none;box-shadow:0 12px 32px rgba(0,0,0,.5)}
.srec.on{display:block}
.srec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.srec-t{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.srec-clr{font-size:10px;color:var(--dim);cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.srec-clr:hover{color:var(--rd)}
.srec-chips{display:flex;flex-wrap:wrap;gap:5px}
.srec-chip{font-size:12px;padding:4px 10px;border-radius:8px;background:var(--card);border:1px solid var(--bd);color:var(--dim);cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:4px}
.srec-chip:hover{border-color:rgba(139,92,246,.4);color:var(--txt);background:var(--hov)}
/* Password generator */
.pwd-out{font-family:monospace;font-size:13px;background:rgba(0,0,0,.3);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;color:var(--txt);word-break:break-all;min-height:44px;line-height:1.6;cursor:pointer;transition:.2s;margin-bottom:9px;letter-spacing:.5px}
.pwd-out:hover{border-color:rgba(139,92,246,.4)}
.pwd-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.pwd-opt{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);cursor:pointer;user-select:none}
.pwd-opt input[type=checkbox]{accent-color:var(--pu);width:15px;height:15px;cursor:pointer}
.pwd-len{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--dim);margin-bottom:10px}
.pwd-range{flex:1;accent-color:var(--pu)}
.pwd-lbl{min-width:28px;text-align:right;color:var(--txt);font-weight:700}
.tool-btn{width:100%;padding:9px;border-radius:10px;background:linear-gradient(135deg,var(--pu),var(--pk));color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:.18s}
.tool-btn:hover{opacity:.88}
.tool-sec{background:rgba(15,23,42,.7);border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:10px}
.tool-lbl{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
/* QR code */
.qr-img-wrap{width:150px;height:150px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;margin:10px auto;overflow:hidden}
.qr-img-wrap img{width:100%;height:100%;object-fit:contain}
.qr-hint{text-align:center;font-size:11px;color:var(--dim);margin-top:6px}
/* Currency */
.cx-row{display:flex;gap:7px;align-items:center;margin-bottom:8px}
.cx-inp{flex:1;background:rgba(255,255,255,.05);border:1.5px solid var(--bd);border-radius:9px;padding:8px 11px;color:var(--txt);font-size:15px;font-family:monospace;outline:none;transition:.2s;width:100%}
.cx-inp:focus{border-color:var(--pu)}
.cx-sel{background:rgba(15,23,42,.9);border:1px solid var(--bd);border-radius:9px;padding:8px 10px;color:var(--txt);font-size:13px;font-family:inherit;outline:none;cursor:pointer;flex-shrink:0}
.cx-res{background:rgba(0,0,0,.2);border-radius:10px;padding:11px;margin-top:5px}
.cx-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.cx-item:last-child{border-bottom:none}
.cx-flag{color:var(--dim)}
.cx-val{color:var(--txt);font-weight:700;font-family:monospace}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}.logo{font-size:38px}.kbhint{display:none}.tbx{width:100%;right:-100%}.topbar,.srch-wrap,.tbar,.pillwrap,.main{padding-left:14px;padding-right:14px}.hdr{padding:18px 14px 10px}.vpncards{grid-template-columns:repeat(2,1fr)}}
.ad-bar{display:flex;justify-content:center;padding:5px 0;overflow:hidden}
.ad-box{display:flex;justify-content:center;padding:18px 0 8px}

/* weather */
.wth{font-size:12px;color:var(--dim);display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--bd)}
/* hotbar */
.hotbar{max-width:1280px;margin:0 auto;padding:0 22px 6px}
.hotbar-in{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;align-items:center}
.hotbar-in::-webkit-scrollbar{display:none}
.hot-lbl{font-size:11px;font-weight:800;color:#ef4444;flex-shrink:0;letter-spacing:1px}
.hot-it{flex-shrink:0;font-size:11px;padding:3px 9px;border-radius:7px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:var(--dim);text-decoration:none;white-space:nowrap;transition:.18s}
.hot-it:hover{background:rgba(239,68,68,.18);color:var(--txt);border-color:rgba(239,68,68,.4)}
.hot-n{font-size:10px;font-weight:800;color:#ef4444;margin-right:2px}
.hot-n.t3{color:#f59e0b}
/* theme */
.thm-wrap{position:relative}
.thm-pop{position:absolute;top:calc(100% + 6px);left:0;background:rgba(8,14,26,.97);border:1px solid var(--bd);border-radius:12px;padding:8px 10px;display:none;gap:7px;z-index:300;align-items:center;box-shadow:0 8px 24px rgba(0,0,0,.6);white-space:nowrap}
.thm-pop.on{display:flex}
.thm-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.18s;flex-shrink:0}
.thm-dot:hover,.thm-dot.sel{border-color:rgba(255,255,255,.8);transform:scale(1.25)}
/* news shortcuts */
.hot-links{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.hot-link{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;border-radius:13px;background:var(--card);border:1px solid var(--bd);text-decoration:none;transition:.2s}
.hot-link:hover{background:var(--hov);border-color:var(--bdhov);transform:translateY(-2px)}
.hot-link-ico{font-size:26px}
.hot-link-name{font-size:12px;font-weight:700;color:var(--txt)}
.hot-link-desc{font-size:10px;color:var(--dim);text-align:center;line-height:1.4}
/* ── hero logo glow ── */
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 28px rgba(139,92,246,.4))}50%{filter:drop-shadow(0 0 52px rgba(236,72,153,.72))}}
.hdr-line{width:0;height:3px;border-radius:3px;background:linear-gradient(90deg,var(--pu),var(--pk),var(--pu));margin:10px auto 12px;animation:expandLine .9s cubic-bezier(.34,1.56,.64,1) .15s forwards}
@keyframes expandLine{to{width:88px}}
/* ── quick access bar ── */
.qbar{max-width:1280px;margin:0 auto;padding:2px 22px 10px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;align-items:center}
.qbar::-webkit-scrollbar{display:none}
.qbar-lbl{font-size:9px;font-weight:800;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;flex-shrink:0;white-space:nowrap;opacity:.55;padding-right:3px}
.qi{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;text-decoration:none;padding:8px 10px;border-radius:12px;background:var(--card);border:1px solid var(--bd);transition:transform .22s,background .18s,border-color .18s,box-shadow .22s;animation:fup .4s ease both}
.qi:hover{background:var(--hov);border-color:var(--bdhov);transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.4),0 0 10px var(--glow)}
.qi-ico{width:32px;height:32px;background:rgba(255,255,255,.06);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:.18s}
.qi:hover .qi-ico{background:rgba(139,92,246,.18);box-shadow:0 0 8px var(--glow)}
.qi-ico img{width:20px;height:20px;object-fit:contain;border-radius:4px}
.qi-name{font-size:9px;color:var(--dim);white-space:nowrap;font-weight:600;max-width:56px;overflow:hidden;text-overflow:ellipsis;text-align:center}
@media(max-width:600px){.qbar{padding-left:14px;padding-right:14px}}
</style>
</head>

<div class="aurora"><div class="ab ab1"></div><div class="ab ab2"></div><div class="ab ab3"></div></div>
<div class="toast" id="toast"></div>
<div class="ovl" id="ovl" onclick="closeTbx()"></div>

<!-- TOOLBOX -->
<div class="tbx" id="tbx">
  <div class="tbx-hd">
    <span class="tbx-title">🧰 工具箱</span>
    <button class="tbx-x" onclick="closeTbx()">✕</button>
  </div>
  <div class="ttabs" style="flex-wrap:wrap">
    <button class="ttab on" onclick="switchTab('note',this)">📝 快记</button>
    <button class="ttab" onclick="switchTab('todo',this)">✅ 待办</button>
    <button class="ttab" onclick="switchTab('pomo',this)">⏱ 番茄</button>
    <button class="ttab" onclick="switchTab('bm',this)">🔖 收藏</button>
    <button class="ttab" onclick="switchTab('pwd',this)">🔑 密码</button>
    <button class="ttab" onclick="switchTab('qr',this)">📷 二维码</button>
    <button class="ttab" onclick="switchTab('cx',this)">💱 汇率</button>

      <div class="ti-row">

          <button class="pmode" id="pm-long" onclick="setMode('long')">长休 15'</button>

        <div class="pring">

            <circle class="ptr" cx="80" cy="80" r="70"/>

              stroke-dasharray="439.82" stroke-dashoffset="0" stroke="url(#pg)"/>
            <defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#8b5cf6"/>
              <stop offset="100%" stop-color="#ec4899"/>

    <!-- BM -->
    <div class="tpanel" id="tp-bm">
      <div class="bmform">
        <div class="bmft">+ 添加收藏</div>
        <input class="bminput" id="bmname" placeholder="网站名称" maxlength="30">

        <button class="bmsave" onclick="addBm()">保存</button>
      </div>
      <div class="bmlist" id="bmlist"></div>
    </div>
    <!-- PASSWORD -->
    <div class="tpanel" id="tp-pwd">
      <div class="tool-sec">
        <div class="tool-lbl">生成密码</div>
        <div class="pwd-out" id="pwdOut" onclick="copyPwd()" title="点击复制">点击生成按钮</div>
        <div class="pwd-len">
          <span>长度</span>
          <input class="pwd-range" type="range" id="pwdLen" min="8" max="32" value="16" oninput="document.getElementById('pwdLbl').textContent=this.value;genPwd()">
          <span class="pwd-lbl" id="pwdLbl">16</span>

        <div class="pwd-opts">
          <label class="pwd-opt"><input type="checkbox" id="pwdUpper" checked onchange="genPwd()"> 大写字母 A-Z</label>

          <label class="pwd-opt"><input type="checkbox" id="pwdNum" checked onchange="genPwd()"> 数字 0-9</label>
          <label class="pwd-opt"><input type="checkbox" id="pwdSym" onchange="genPwd()"> 符号 !@#$%</label>
        </div>
        <button class="tool-btn" onclick="genPwd()">🔑 生成新密码</button>
      </div>
    </div>
    <!-- QR CODE -->
    <div class="tpanel" id="tp-qr">
      <div class="tool-sec">
        <div class="tool-lbl">二维码生成</div>
        <input class="bminput" id="qrInput" placeholder="输入文字或网址..." maxlength="500" oninput="genQR()">
        <div class="qr-img-wrap" id="qrWrap"><span style="color:#94a3b8;font-size:12px">输入内容后生成</span></div>
        <div class="qr-hint">点击二维码长按保存</div>
      </div>
    </div>
    <!-- CURRENCY -->

      <div class="tool-sec">

        <div class="cx-row">
          <input class="cx-inp" id="cxAmt" type="number" value="100" oninput="calcCx()">

    <!-- NEWS -->

        <a class="hot-link" href="https://www.v2ex.com/?tab=hot" target="_blank" rel="noopener"><span class="hot-link-ico">💬</span><span class="hot-link-name">V2EX 热榜</span><span class="hot-link-desc">技术社区</span></a>
      </div>
    </div>
  </div>
</div>

function tickClock(){
  try{
    var d=new Date();
    var h=String(d.getHours()).padStart(2,'0');
    var m=String(d.getMinutes()).padStart(2,'0');
    var s=String(d.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent=h+':'+m+':'+s;
    document.getElementById('datestr').textContent=
      d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+DAYS[d.getDay()];
    document.getElementById('greet').textContent=GR[d.getHours()];
  }catch(e){}
  setTimeout(tickClock,1000);
}

// ── 数字动画 ──
function countUp(el, target){
  var n=0, steps=40;
  var step=Math.max(1, Math.ceil(target/steps));
  var timer=setInterval(function(){
    n=Math.min(n+step, target);
    el.textContent=n;
    if(n>=target){clearInterval(timer);}
  }, 600/steps);
}

var TCLS={hot:'th',new:'tn',free:'tf'};
var TLBL={hot:'HOT',new:'NEW',free:'FREE'};
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

function renderSites(){

    return;

  var showHost=!q&&(activeCat==="全部"||activeCat.indexOf("部署")>=0);
  var html=(showVpn?renderVpnSection():'')+(showHost?renderHostSection():'');

      var tag=s.t?('<span class="stag '+(TCLS[s.t]||'tn')+'">'+TLBL[s.t]+'</span>'):'';

var CHARS={upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',lower:'abcdefghijklmnopqrstuvwxyz',num:'0123456789',sym:'!@#$%^&*()_+-=[]{}|'};
function genPwd(){
  var len=parseInt(document.getElementById('pwdLen').value)||16;
  var pool='';
  if(document.getElementById('pwdUpper').checked)pool+=CHARS.upper;
  if(document.getElementById('pwdLower').checked)pool+=CHARS.lower;
  if(document.getElementById('pwdNum').checked)pool+=CHARS.num;
  if(document.getElementById('pwdSym').checked)pool+=CHARS.sym;
  if(!pool)pool=CHARS.lower+CHARS.num;
  var pwd='';
  for(var i=0;i<len;i++)pwd+=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('pwdOut').textContent=pwd;
}
function copyPwd(){
  var t=document.getElementById('pwdOut').textContent;
  if(!t||t==='点击生成按钮')return;
  try{navigator.clipboard.writeText(t).then(function(){showToast('🔑 密码已复制');});}
  catch(e){showToast('🔑 '+t);}
}

    var city=d.nearest_area[0].areaName[0].value;

    var code=parseInt(cc.weatherCode);
    var ic=code===113?'☀':code<=116?'⛅':code<=122?'☁':code<=143?'🌫':code<=200?'🌦':code<=299?'🌧':code<=350?'🌨':'⛈';
    var el=document.getElementById('wth');
    el.textContent=ic+' '+city+' '+t+'°C';
    el.style.display='inline-flex';
  }).catch(function(){});
}

// ── 热搜 ──
function fetchHot(){}

// ── 主题 ──
var THEMES={
  pu:{n:'💜 紫',c:'#8b5cf6',p:'#ec4899',bg:'#060c1a'},
  bl:{n:'💙 蓝',c:'#0ea5e9',p:'#38bdf8',bg:'#020c1a'},
  gr:{n:'💚 绿',c:'#10b981',p:'#34d399',bg:'#040f09'},
  rd:{n:'❤ 玫瑰',c:'#f43f5e',p:'#fb7185',bg:'#140408'},
  gd:{n:'🧡 金',c:'#f59e0b',p:'#fbbf24',bg:'#100900'},
};
var curThm=gl('thm')||'pu';
function applyThm(t){
  var th=THEMES[t]||THEMES.pu;
  var s=document.documentElement.style;
  s.setProperty('--pu',th.c);s.setProperty('--pk',th.p);s.setProperty('--bg',th.bg);
  var rgb=th.c.slice(1).match(/.{2}/g).map(function(x){return parseInt(x,16);});
  s.setProperty('--glow','rgba('+rgb.join(',')+',.25)');
  curThm=t;sl('thm',t);renderThmPop();
  document.getElementById('thmPop').classList.remove('on');
}
function renderThmPop(){
  var html='';
  Object.keys(THEMES).forEach(function(k){
    var th=THEMES[k];
    html+='<div class="thm-dot'+(k===curThm?' sel':'')+'" style="background:linear-gradient(135deg,'+th.c+','+th.p+')" onclick="applyThm(\''+k+'\')" title="'+th.n+'"></div>';
  });
  document.getElementById('thmPop').innerHTML=html;
}
function toggleThm(e){
  var pop=document.getElementById('thmPop');
  pop.classList.toggle('on');
  if(pop.classList.contains('on'))renderThmPop();
  if(e)e.stopPropagation();
}
document.addEventListener('click',function(e){
  if(!e.target.closest('#thmBtn')){var p=document.getElementById('thmPop');if(p)p.classList.remove('on');}
});
window.applyThm=applyThm;window.toggleThm=toggleThm;


function init(){
  var total=0;CATS.forEach(function(c){total+=c.sites.length;});
  countUp(document.getElementById('catN'), CATS.length);
  countUp(document.getElementById('siteN'), total);
  renderEng();
  renderPills();
  applyView();
  renderSites();
  renderQBar();
  initNote();
  renderTodos();
  updatePomoUI();
  renderBms();

  var inp=document.getElementById('q');
  inp.addEventListener('focus',function(){
    if(!inp.value&&searchHistory.length){renderHistory();document.getElementById('srec').classList.add('on');}
  });
  inp.addEventListener('blur',function(){
    setTimeout(function(){document.getElementById('srec').classList.remove('on');},200);
  });
  inp.addEventListener('input',function(){
    document.getElementById('sclr').classList.toggle('on',inp.value.length>0);
    document.getElementById('srec').classList.remove('on');
    renderSites();
  });
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter')doSearch();
  });
  genPwd();
  calcCx();
  applyThm(curThm);
  fetchWeather();
  fetchHot();
}

window.goTop=function(){window.scrollTo({top:0,behavior:'smooth'});};

// DOM 就绪后初始化
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}
</script>
