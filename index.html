<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智航 Pro - 你的高效起点</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --accent: #ec4899;
            --bg: #030712;
            --card-bg: rgba(31, 41, 55, 0.4);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --glass: blur(16px) saturate(180%);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        body { 
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            color: var(--text-main);
            line-height: 1.5;
        }

        /* 顶部数字时钟 */
        .top-bar {
            padding: 20px 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        #clock { font-size: 14px; font-weight: 500; color: var(--text-dim); }

        .header { text-align:center; padding: 30px 20px; }
        .header h1 { 
            font-size: 32px; font-weight: 800; 
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* 搜索框升级 */
        .search-container {
            position: sticky; top: 0; z-index: 100;
            padding: 10px 16px 20px;
            background: linear-gradient(to bottom, var(--bg) 50%, transparent);
            backdrop-filter: var(--glass);
        }
        .search-wrap { max-width: 650px; margin: 0 auto; position: relative; }
        .search-wrap input {
            width:100%; background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 14px 15px 14px 45px;
            color: white; font-size: 16px; outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 25px var(--primary-glow);
            background: rgba(17, 24, 39, 1);
            transform: translateY(-1px);
        }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); opacity: 0.6; }

        /* 快捷分类 */
        .pills {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 16px 20px;
            max-width: 1200px; margin: 0 auto;
            scrollbar-width: none;
        }
        .pills::-webkit-scrollbar { display: none; }
        .pill {
            flex-shrink: 0; padding: 10px 20px; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-dim); transition: 0.3s;
        }
        .pill.active { background: var(--primary); color: white; box-shadow: 0 4px 15px var(--primary-glow); }

        /* 卡片布局 */
        .main-content { max-width: 1200px; margin: 0 auto; padding: 0 16px 100px; }
        .section-title { font-size: 14px; color: var(--primary); font-weight: 700; margin: 25px 0 15px 4px; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
        
        .site-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px; padding: 16px; text-decoration: none;
            display: flex; flex-direction: column; align-items: flex-start;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .site-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-6px) scale(1.02);
            border-color: var(--primary);
        }
        .site-icon {
            width: 44px; height: 44px; background: rgba(255,255,255,0.05);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-bottom: 12px;
        }
        .site-icon img { width: 28px; height: 28px; object-fit: contain; }
        
        .site-name { color: var(--text-main); font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .site-desc { color: var(--text-dim); font-size: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .hl { color: #f472b6; font-weight: bold; background: rgba(244, 114, 182, 0.1); padding: 0 2px; border-radius: 4px; }

        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="clock">00:00:00</div>
    <div style="font-size: 12px; opacity: 0.5;">v2.0 Pro</div>
</div>

<div class="header">
    <h1>智航 PRO</h1>
</div>

<div class="search-container">
    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索站内，按回车搜索全网...">
    </div>
</div>

<div class="pills" id="pills"></div>

<div class="main-content" id="sitesContainer"></div>

<script>
const categories = [
    { name: "常用", sites: [
        { id: "google", name: "Google", url: "https://www.google.com", icon: "🔍", desc: "全球最大的搜索引擎" },
        { id: "github", name: "GitHub", url: "https://github.com", icon: "🐙", desc: "程序员的家园" },
        { id: "youtube", name: "YouTube", url: "https://www.youtube.com", icon: "📺", desc: "全球视频盛宴" },
        { id: "bilibili", name: "Bilibili", url: "https://www.bilibili.com", icon: "📺", desc: "国内领先视频社区" }
    ]},
    { name: "🤖 AI 工具", sites: [
        { id: "chatgpt", name: "ChatGPT", url: "https://chat.openai.com", icon: "💬", desc: "OpenAI 智能大脑" },
        { id: "claude", name: "Claude", url: "https://claude.ai", icon: "🤖", desc: "最懂人心的 AI 助手" },
        { id: "midjourney", name: "Midjourney", url: "https://www.midjourney.com", icon: "🎨", desc: "最顶尖的 AI 绘图" },
        { id: "perplex", name: "Perplexity", url: "https://www.perplexity.ai", icon: "🔍", desc: "AI 时代的搜索方式" }
    ]},
    { name: "💻 开发设计", sites: [
        { id: "vercel", name: "Vercel", url: "https://vercel.com", icon: "▲", desc: "极速网页部署" },
        { id: "figma", name: "Figma", url: "https://www.figma.com", icon: "🎨", desc: "专业协作设计工具" },
        { id: "stackoverflow", name: "StackOverflow", url: "https://stackoverflow.com", icon: "💻", desc: "开发者问答社区" },
        { id: "juejin", name: "稀土掘金", url: "https://juejin.cn", icon: "💎", desc: "开发者技术社区" }
    ]},
    { name: "🎬 摸鱼/灵感", sites: [
        { id: "weibo", name: "微博", url: "https://weibo.com", icon: "👁️", desc: "实时热点早知道" },
        { id: "douban", name: "豆瓣", url: "https://douban.com", icon: "📚", desc: "书影音的精神角落" },
        { id: "producthunt", name: "ProductHunt", url: "https://www.producthunt.com", icon: "😺", desc: "发现最新有趣产品" }
    ]}
];

let activeCat = "全部";

function init() {
    renderPills();
    renderSites();
    startTime();
    
    const input = document.getElementById('searchInput');
    input.addEventListener('input', renderSites);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            window.open(`https://www.google.com/search?q=${input.value}`, '_blank');
        }
    });
}

function startTime() {
    const today = new Date();
    document.getElementById('clock').innerHTML = today.toLocaleTimeString('zh-CN', { hour12: false });
    setTimeout(startTime, 1000);
}

function renderPills() {
    const all = ["全部", ...categories.map(c => c.name)];
    document.getElementById('pills').innerHTML = all.map(n => `
        <button class="pill ${n === activeCat ? 'active' : ''}" onclick="switchCat('${n}')">${n}</button>
    `).join('');
}

window.switchCat = (name) => {
    activeCat = name;
    renderPills();
    renderSites();
};

function getIcon(url, emoji) {
    const domain = new URL(url).hostname;
    return `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64" onerror="this.outerHTML='${emoji}'">`;
}

function renderSites() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const container = document.getElementById('sitesContainer');
    
    const filtered = categories.map(cat => ({
        ...cat,
        sites: cat.sites.filter(s => 
            !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q)
        )
    })).filter(cat => cat.sites.length > 0 && (activeCat === "全部" || cat.name === activeCat));

    if (filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:100px; opacity:0.3;">未找到相关站点，回车可直接 Google 搜索</div>`;
        return;
    }

    container.innerHTML = filtered.map(cat => `
        <div class="section-title">${cat.name}</div>
        <div class="grid">
            ${cat.sites.map(s => {
                const name = q ? s.name.replace(new RegExp(`(${q})`, 'gi'), '<em class="hl">$1</em>') : s.name;
                return `
                    <a href="${s.url}" target="_blank" class="site-card">
                        <div class="site-icon">${getIcon(s.url, s.icon)}</div>
                        <div class="site-name">${name}</div>
                        <div class="site-desc">${s.desc}</div>
                    </a>
                `;
            }).join('')}
        </div>
    `).join('');
}

init();
</script>
</body>
</html>
