<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>智航 Pro · 你的高效起点</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="智航PRO">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <style>
        :root {
            --bg:#060c1a; --card:rgba(255,255,255,.04); --card-hov:rgba(255,255,255,.08);
            --border:rgba(255,255,255,.07); --border-hov:rgba(139,92,246,.5);
            --text:#f1f5f9; --muted:#94a3b8;
            --purple:#8b5cf6; --pink:#ec4899; --blue:#3b82f6; --green:#10b981;
            --red:#ef4444; --yellow:#f59e0b; --glow-p:rgba(139,92,246,.28);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}
        .aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
        .ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:.1;animation:drift 30s infinite ease-in-out;}
        .ab:nth-child(1){width:700px;height:700px;background:radial-gradient(circle,#7c3aed,#4f46e5);top:-200px;left:-150px;animation-duration:32s;}
        .ab:nth-child(2){width:600px;height:600px;background:radial-gradient(circle,#db2777,#be185d);bottom:-150px;right:-150px;animation-duration:38s;animation-delay:-12s;}
        .ab:nth-child(3){width:450px;height:450px;background:radial-gradient(circle,#2563eb,#0ea5e9);top:40%;left:45%;animation-duration:44s;animation-delay:-6s;}
        .ab:nth-child(4){width:300px;height:300px;background:radial-gradient(circle,#059669,#10b981);top:20%;right:20%;animation-duration:36s;animation-delay:-18s;opacity:.07;}
        @keyframes drift{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(60px,40px) scale(1.08);}50%{transform:translate(-40px,70px) scale(.94);}75%{transform:translate(50px,-40px) scale(1.05);}}
        body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.025) 1px,transparent 1px);background-size:28px 28px;}
        .wrap{position:relative;z-index:1;}
        .top-bar{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 0;max-width:1300px;margin:0 auto;}
        .clock{font-size:22px;font-weight:800;letter-spacing:3px;font-variant-numeric:tabular-nums;background:linear-gradient(120deg,#c4b5fd,#f9a8d4,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .date-line{font-size:12px;color:var(--muted);margin-top:2px;}
        .greeting{font-size:13px;color:var(--muted);}
        .version{font-size:11px;padding:3px 9px;border-radius:8px;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.2);color:var(--purple);font-weight:700;}
        .header{text-align:center;padding:24px 24px 14px;}
        .logo{font-size:42px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#c4b5fd 0%,#f9a8d4 45%,#93c5fd 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 32px rgba(139,92,246,.5));}
        .tagline{font-size:13px;color:var(--muted);margin-top:8px;letter-spacing:2px;}
        .stat-chips{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
        .chip{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--muted);}
        .chip b{color:var(--purple);}
        .search-sticky{position:sticky;top:0;z-index:100;padding:10px 24px 14px;background:linear-gradient(to bottom,rgba(6,12,26,.97) 65%,transparent);backdrop-filter:blur(22px);}
        .search-box{max-width:700px;margin:0 auto;}
        .input-wrap{position:relative;}
        .input-wrap input{width:100%;background:rgba(15,23,42,.85);border:1.5px solid var(--border);border-radius:20px;padding:14px 52px 14px 52px;color:var(--text);font-size:16px;outline:none;transition:border-color .3s,box-shadow .3s,background .3s;font-family:inherit;}
        .input-wrap input:focus{border-color:var(--purple);background:rgba(15,23,42,1);box-shadow:0 0 0 4px var(--glow-p),0 10px 36px rgba(0,0,0,.6);}
        .input-wrap input::placeholder{color:rgba(148,163,184,.4);}
        .si-l{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:17px;opacity:.45;pointer-events:none;}
        .si-clr{position:absolute;right:15px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:var(--muted);cursor:pointer;font-size:13px;display:none;align-items:center;justify-content:center;transition:.2s;}
        .si-clr.on{display:flex;}
        .si-clr:hover{background:rgba(255,255,255,.18);color:var(--text);}
        .eng-row{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
        .eng{font-size:12px;padding:5px 13px;border-radius:9px;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.2s;font-family:inherit;}
        .eng.on{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-color:transparent;box-shadow:0 2px 14px var(--glow-p);}
        .eng:hover:not(.on){border-color:rgba(139,92,246,.4);color:var(--text);}
        .toolbar{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:0 24px 6px;flex-wrap:wrap;gap:6px;}
        .tb-group{display:flex;gap:6px;flex-wrap:wrap;}
        .tbb{font-size:12px;padding:6px 13px;border-radius:9px;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px;font-family:inherit;}
        .tbb:hover{background:var(--card-hov);color:var(--text);border-color:var(--border-hov);}
        .tbb.on{background:rgba(139,92,246,.14);color:var(--purple);border-color:rgba(139,92,246,.35);}
        .pills-wrap{max-width:1300px;margin:0 auto;padding:4px 24px 16px;overflow-x:auto;scrollbar-width:none;}
        .pills-wrap::-webkit-scrollbar{display:none;}
        .pills{display:flex;gap:7px;width:max-content;}
        .pill{flex-shrink:0;padding:7px 15px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;background:var(--card);border:1px solid var(--border);color:var(--muted);transition:.25s;display:flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;}
        .pill .cnt{font-size:10px;font-weight:700;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:10px;}
        .pill.on{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-color:transparent;box-shadow:0 4px 20px var(--glow-p);}
        .pill.on .cnt{background:rgba(255,255,255,.22);}
        .pill:hover:not(.on){border-color:rgba(139,92,246,.4);color:var(--text);}
        .rstats{max-width:1300px;margin:0 auto 4px;padding:0 24px;font-size:12px;color:var(--muted);min-height:18px;}
        .main{max-width:1300px;margin:0 auto;padding:0 24px 120px;}
        .sec{margin-bottom:6px;}
        .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-top:22px;}
        .sec-title{font-size:12px;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:2px;white-space:nowrap;}
        .sec-line{flex:1;height:1px;background:linear-gradient(to right,rgba(139,92,246,.3),transparent);}
        .sec-cnt{font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:2px 8px;border-radius:10px;flex-shrink:0;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px;margin-bottom:6px;}
        .list .grid{grid-template-columns:1fr;}
        .list .site-card{flex-direction:row;align-items:center;gap:13px;padding:11px 15px;border-radius:13px;}
        .list .site-icon{margin-bottom:0;flex-shrink:0;}
        .list .site-info{flex:1;min-width:0;}
        .list .site-desc{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;-webkit-line-clamp:unset;}
        .site-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;text-decoration:none;display:flex;flex-direction:column;align-items:flex-start;position:relative;overflow:hidden;transition:transform .3s cubic-bezier(.175,.885,.32,1.275),background .25s,border-color .25s,box-shadow .25s;animation:fadeUp .4s ease both;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
        .site-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 50%,rgba(139,92,246,.07));opacity:0;transition:.25s;}
        .site-card:hover{background:var(--card-hov);border-color:rgba(139,92,246,.45);transform:translateY(-5px) scale(1.015);box-shadow:0 16px 40px rgba(0,0,0,.55),0 0 20px var(--glow-p);}
        .site-card:hover::before{opacity:1;}
        .site-icon{width:44px;height:44px;background:rgba(255,255,255,.06);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:11px;flex-shrink:0;transition:.25s;}
        .site-card:hover .site-icon{background:rgba(139,92,246,.18);box-shadow:0 0 12px var(--glow-p);}
        .site-icon img{width:27px;height:27px;object-fit:contain;border-radius:6px;}
        .site-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.3;}
        .site-desc{font-size:11px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
        .stag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;position:absolute;top:10px;right:10px;letter-spacing:.8px;}
        .t-hot{background:rgba(239,68,68,.18);color:#f87171;border:1px solid rgba(248,113,113,.25);}
        .t-new{background:rgba(16,185,129,.18);color:#34d399;border:1px solid rgba(52,211,153,.25);}
        .t-free{background:rgba(59,130,246,.18);color:#60a5fa;border:1px solid rgba(96,165,250,.25);}
        em.hl{font-style:normal;color:#f472b6;background:rgba(244,114,182,.12);padding:0 2px;border-radius:3px;}
        .empty{text-align:center;padding:80px 24px;color:var(--muted);}
        .empty .big{font-size:48px;margin-bottom:12px;}

        /* TOOLBOX */
        .toolbox{position:fixed;top:0;right:-360px;width:340px;height:100vh;z-index:500;background:rgba(9,15,28,.97);border-left:1px solid var(--border);backdrop-filter:blur(24px);display:flex;flex-direction:column;transition:right .35s cubic-bezier(.4,0,.2,1);box-shadow:-20px 0 60px rgba(0,0,0,.6);}
        .toolbox.open{right:0;}
        .toolbox-header{padding:18px 18px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
        .toolbox-title{font-size:14px;font-weight:700;color:var(--text);}
        .toolbox-close{width:30px;height:30px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s;}
        .toolbox-close:hover{background:var(--card-hov);color:var(--text);}
        .tool-tabs{display:flex;gap:4px;padding:12px 18px 0;flex-shrink:0;}
        .ttab{flex:1;padding:8px 0;border-radius:10px;font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;text-align:center;transition:.2s;font-family:inherit;}
        .ttab.on{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-color:transparent;}
        .ttab:hover:not(.on){color:var(--text);border-color:var(--border-hov);}
        .tool-body{flex:1;overflow-y:auto;padding:16px 18px;scrollbar-width:thin;scrollbar-color:rgba(139,92,246,.3) transparent;}
        .tool-body::-webkit-scrollbar{width:4px;}
        .tool-body::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3);border-radius:4px;}
        .tpanel{display:none;}
        .tpanel.on{display:block;}
        /* NOTE */
        .note-area{width:100%;min-height:260px;resize:none;background:rgba(15,23,42,.8);border:1.5px solid var(--border);border-radius:14px;padding:13px;color:var(--text);font-size:13px;line-height:1.7;font-family:inherit;outline:none;transition:.2s;}
        .note-area:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--glow-p);}
        .note-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:11px;color:var(--muted);}
        .saved-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
        /* TODO */
        .todo-input-row{display:flex;gap:8px;margin-bottom:12px;}
        .todo-input{flex:1;background:rgba(15,23,42,.8);border:1.5px solid var(--border);border-radius:12px;padding:10px 13px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:.2s;}
        .todo-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--glow-p);}
        .todo-add{width:38px;height:38px;border-radius:10px;background:var(--purple);border:none;color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
        .todo-add:hover{background:#7c3aed;transform:scale(1.05);}
        .todo-stats{font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;}
        .todo-clear{font-size:11px;color:var(--red);cursor:pointer;background:none;border:none;font-family:inherit;}
        .todo-clear:hover{text-decoration:underline;}
        .todo-list{display:flex;flex-direction:column;gap:7px;}
        .todo-item{display:flex;align-items:center;gap:10px;background:rgba(15,23,42,.6);border:1px solid var(--border);border-radius:11px;padding:10px 12px;transition:.2s;animation:fadeUp .25s ease;}
        .todo-item.done .todo-text{text-decoration:line-through;color:var(--muted);opacity:.6;}
        .todo-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;font-size:12px;color:#fff;}
        .todo-item.done .todo-check{background:var(--green);border-color:var(--green);}
        .todo-text{flex:1;font-size:13px;color:var(--text);line-height:1.4;word-break:break-word;}
        .todo-del{width:24px;height:24px;border-radius:6px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;opacity:0;}
        .todo-item:hover .todo-del{opacity:1;}
        .todo-del:hover{background:rgba(239,68,68,.15);color:var(--red);}
        .todo-empty{text-align:center;padding:30px;color:var(--muted);font-size:13px;}
        /* POMODORO */
        .pomo-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;padding-top:8px;}
        .pomo-ring{position:relative;width:170px;height:170px;}
        .pomo-svg{transform:rotate(-90deg);}
        .pomo-track{fill:none;stroke:rgba(255,255,255,.06);stroke-width:10;}
        .pomo-progress{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .4s;}
        .pomo-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        .pomo-time{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px;}
        .pomo-label{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:1px;}
        .pomo-controls{display:flex;gap:10px;}
        .pomo-btn{padding:9px 20px;border-radius:11px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:.2s;font-family:inherit;}
        .pomo-start{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;}
        .pomo-start:hover{opacity:.9;transform:scale(1.03);}
        .pomo-reset{background:var(--card);border:1px solid var(--border);color:var(--muted);}
        .pomo-reset:hover{border-color:var(--border-hov);color:var(--text);}
        .pomo-mode-row{display:flex;gap:6px;}
        .pomo-mode{padding:6px 14px;border-radius:9px;font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.2s;font-family:inherit;}
        .pomo-mode.on{background:rgba(139,92,246,.2);color:var(--purple);border-color:rgba(139,92,246,.35);}
        .pomo-cycles{font-size:12px;color:var(--muted);}
        .pomo-cycles b{color:var(--yellow);}
        /* BOOKMARKS */
        .bm-form{background:rgba(15,23,42,.7);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
        .bm-form-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
        .bm-input{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;transition:.2s;}
        .bm-input:focus{border-color:var(--purple);}
        .bm-save{width:100%;padding:9px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:.2s;}
        .bm-save:hover{opacity:.9;}
        .bm-list{display:flex;flex-direction:column;gap:7px;}
        .bm-item{display:flex;align-items:center;gap:9px;background:rgba(15,23,42,.6);border:1px solid var(--border);border-radius:11px;padding:9px 12px;text-decoration:none;transition:.2s;}
        .bm-item:hover{background:var(--card-hov);border-color:var(--border-hov);}
        .bm-ico{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;}
        .bm-ico img{width:18px;height:18px;object-fit:contain;border-radius:4px;}
        .bm-info{flex:1;min-width:0;}
        .bm-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .bm-url{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .bm-del{width:22px;height:22px;border-radius:6px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;opacity:0;}
        .bm-item:hover .bm-del{opacity:1;}
        .bm-del:hover{background:rgba(239,68,68,.15);color:var(--red);}
        .bm-empty{text-align:center;padding:24px;color:var(--muted);font-size:13px;}
        /* FABs */
        .fab-wrap{position:fixed;bottom:26px;right:24px;display:flex;flex-direction:column;gap:9px;z-index:400;}
        .fab{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;transition:.22s;box-shadow:0 4px 20px rgba(0,0,0,.5);}
        .fab-tool{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;position:relative;}
        .fab-tool:hover{transform:scale(1.1);box-shadow:0 8px 28px var(--glow-p);}
        .fab-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--red);border-radius:50%;font-size:9px;font-weight:800;color:#fff;display:none;align-items:center;justify-content:center;border:2px solid var(--bg);}
        .fab-badge.on{display:flex;}
        .fab-top{background:rgba(15,23,42,.85);color:var(--muted);border:1px solid var(--border);backdrop-filter:blur(12px);}
        .fab-top:hover{color:var(--text);transform:scale(1.05);}
        .kbd-hint{position:fixed;bottom:26px;left:24px;font-size:11px;color:var(--muted);background:rgba(15,23,42,.85);border:1px solid var(--border);padding:6px 12px;border-radius:10px;backdrop-filter:blur(14px);z-index:200;}
        kbd{font-size:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:1px 5px;border-radius:4px;font-family:monospace;margin:0 2px;}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-90px);background:rgba(15,23,42,.97);border:1px solid var(--border);padding:10px 22px;border-radius:13px;font-size:13px;color:var(--text);backdrop-filter:blur(16px);transition:transform .32s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);}
        .toast.on{transform:translateX(-50%) translateY(0);}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:499;display:none;backdrop-filter:blur(2px);}
        .overlay.on{display:block;}

        {n:"拼多多",u:"https://www.pinduoduo.com",e:"🥑",d:"拼团特价购物"},
        {n:"1688",u:"https://www.1688.com",e:"🏭",d:"阿里批发采购"},

// State
let activeCat=ls('nc')||"全部",activeEngine=+(ls('ne')||0),isListView=ls('nv')==='1';

// Boot
(function(){
    const total=CATS.reduce((s,c)=>s+c.sites.length,0);
    document.getElementById('catN').textContent=CATS.length;
    document.getElementById('siteN').textContent=total;
    renderEngines();renderPills();applyView();renderSites();startClock();
    initNote();initTodo();initPomo();initBookmarks();
    const inp=document.getElementById('q');
    inp.addEventListener('input',()=>{document.getElementById('clrBtn').classList.toggle('on',inp.value.length>0);renderSites();});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&inp.value.trim())window.open(ENGINES[activeEngine].u+encodeURIComponent(inp.value.trim()),'_blank');});
    document.addEventListener('keydown',e=>{
        const tag=document.activeElement.tagName;
        if(tag==='INPUT'||tag==='TEXTAREA')return;
        if(e.key==='/')  {e.preventDefault();inp.focus();}
        if(e.key==='Escape'){clearQ();inp.blur();}
        if(e.key.toLowerCase()==='t'){e.preventDefault();toggleToolbox();}
    });
})();

// Clock
function startClock(){
    const GR=['🌙 夜深了','🌙 夜深了','🌙 夜深了','🌙 夜深了','🌙 夜深了','🌙 夜深了','🌅 早上好','🌅 早上好','☀️ 上午好','☀️ 上午好','☀️ 上午好','☀️ 上午好','🌤️ 中午好','🌤️ 下午好','🌤️ 下午好','🌤️ 下午好','🌤️ 下午好','🌤️ 下午好','🌆 傍晚好','🌆 傍晚好','🌃 晚上好','🌃 晚上好','🌃 晚上好','🌙 夜深了'];
    const DAY=['周日','周一','周二','周三','周四','周五','周六'];
    (function tick(){const d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString('zh-CN',{hour12:false});document.getElementById('dateLine').textContent=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${DAY[d.getDay()]}`;document.getElementById('greeting').textContent=GR[d.getHours()];setTimeout(tick,1000);})();
}
function renderEngines(){document.getElementById('engRow').innerHTML=ENGINES.map((e,i)=>`<button class="eng ${i===activeEngine?'on':''}" onclick="setEng(${i})">${e.n}</button>`).join('');}
window.setEng=i=>{activeEngine=i;lss('ne',i);renderEngines();};
function renderPills(){const allN=CATS.reduce((s,c)=>s+c.sites.length,0);const items=[{name:"全部",cnt:allN},...CATS.map(c=>({name:c.name,cnt:c.sites.length}))];document.getElementById('pills').innerHTML=items.map(p=>`<button class="pill ${p.name===activeCat?'on':''}" onclick="setCat('${p.name.replace(/'/g,"\\'")}')"> ${p.name}<span class="cnt">${p.cnt}</span></button>`).join('');}
window.setCat=n=>{activeCat=n;lss('nc',n);renderPills();renderSites();};
function applyView(){const btn=document.getElementById('viewBtn');document.getElementById('main').classList.toggle('list',isListView);btn.textContent=isListView?'⊞ 网格':'☰ 列表';btn.classList.toggle('on',isListView);}
window.toggleView=()=>{isListView=!isListView;lss('nv',isListView?'1':'');applyView();};
window.randomSite=()=>{const all=CATS.flatMap(c=>c.sites);const s=all[Math.floor(Math.random()*all.length)];toast(`🎲 随机跳转：${s.n}`);setTimeout(()=>window.open(s.u,'_blank'),600);};
window.clearQ=()=>{document.getElementById('q').value='';document.getElementById('clrBtn').classList.remove('on');renderSites();};
function fav(url,em){try{const d=new URL(url).hostname;return `<img src="https://www.google.com/s2/favicons?domain=${d}&sz=64" onerror="this.outerHTML='${em}'" alt="" loading="lazy">`;}catch{return em;}}
function escR(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
const TCLS={hot:'t-hot',new:'t-new',free:'t-free'};const TLBL={hot:'HOT',new:'NEW',free:'FREE'};
function renderSites(){
    const q=document.getElementById('q').value.trim().toLowerCase();
    const main=document.getElementById('main');
    const filtered=CATS.map(c=>({...c,sites:c.sites.filter(s=>!q||s.n.toLowerCase().includes(q)||s.d.toLowerCase().includes(q))})).filter(c=>c.sites.length>0&&(activeCat==="全部"||c.name===activeCat));
    document.getElementById('rstats').textContent=q?`找到 ${filtered.reduce((s,c)=>s+c.sites.length,0)} 个匹配站点`:'';
    if(!filtered.length){main.innerHTML=`<div class="empty"><div class="big">🔍</div>没有找到「${q}」<br><small style="display:block;margin-top:8px;font-size:13px">按 Enter 直接搜索全网</small></div>`;return;}
    main.innerHTML=filtered.map((cat,ci)=>`<div class="sec"><div class="sec-head"><div class="sec-title">${cat.name}</div><div class="sec-line"></div><div class="sec-cnt">${cat.sites.length}</div></div><div class="grid">${cat.sites.map((s,si)=>{const delay=(ci*3+si)*15;const nm=q?s.n.replace(new RegExp(`(${escR(q)})`,'gi'),'<em class="hl">$1</em>'):s.n;const tag=s.t?`<span class="stag ${TCLS[s.t]||'t-new'}">${TLBL[s.t]||s.t.toUpperCase()}</span>`:'';return `<a href="${s.u}" target="_blank" rel="noopener noreferrer" class="site-card" style="animation-delay:${delay}ms">${tag}<div class="site-icon">${fav(s.u,s.e)}</div><div class="site-info"><div class="site-name">${nm}</div><div class="site-desc">${s.d}</div></div></a>`;}).join('')}</div></div>`).join('');
}

// TOOLBOX
window.openToolbox=function(tab){document.getElementById('toolbox').classList.add('open');document.getElementById('overlay').classList.add('on');if(tab){const idx=['note','todo','pomo','bm'].indexOf(tab);const btn=document.querySelectorAll('.ttab')[idx];if(btn)switchTool(tab,btn);}};
window.closeToolbox=function(){document.getElementById('toolbox').classList.remove('open');document.getElementById('overlay').classList.remove('on');};
window.toggleToolbox=function(){const tb=document.getElementById('toolbox');tb.classList.contains('open')?closeToolbox():openToolbox('note');};
window.switchTool=function(id,btn){document.querySelectorAll('.tpanel').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.ttab').forEach(t=>t.classList.remove('on'));document.getElementById('tp-'+id).classList.add('on');if(btn)btn.classList.add('on');};

// NOTE
function initNote(){const ta=document.getElementById('noteArea');ta.value=ls('note')||'';updateNC();ta.addEventListener('input',()=>{lss('note',ta.value);updateNC();});}
function updateNC(){document.getElementById('noteCount').textContent=`${document.getElementById('noteArea').value.length} 字`;}

// TODO
let todos=[];
function initTodo(){todos=JSON.parse(ls('todos')||'[]');renderTodos();document.getElementById('todoInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo();});}
window.addTodo=function(){const inp=document.getElementById('todoInput');const txt=inp.value.trim();if(!txt)return;todos.unshift({id:Date.now(),text:txt,done:false});inp.value='';saveTodos();renderTodos();};
window.toggleTodo=function(id){const t=todos.find(t=>t.id===id);if(t){t.done=!t.done;saveTodos();renderTodos();}};
window.delTodo=function(id){todos=todos.filter(t=>t.id!==id);saveTodos();renderTodos();};
window.clearDone=function(){todos=todos.filter(t=>!t.done);saveTodos();renderTodos();};
function saveTodos(){lss('todos',JSON.stringify(todos));}
function renderTodos(){
    const undone=todos.filter(t=>!t.done).length;
    document.getElementById('todoStats').textContent=`共 ${todos.length} 项，待完成 ${undone} 项`;
    const badge=document.getElementById('todoBadge');
    if(undone>0){badge.textContent=undone>9?'9+':undone;badge.classList.add('on');}else badge.classList.remove('on');
    const list=document.getElementById('todoList');
    if(!todos.length){list.innerHTML=`<div class="todo-empty">🎉 暂无任务，放松一下！</div>`;return;}
    list.innerHTML=todos.map(t=>`<div class="todo-item ${t.done?'done':''}"><div class="todo-check" onclick="toggleTodo(${t.id})">${t.done?'✓':''}</div><div class="todo-text">${escH(t.text)}</div><button class="todo-del" onclick="delTodo(${t.id})">✕</button></div>`).join('');
}

// POMODORO
const PM={work:{secs:1500,label:'专注时间',color:'url(#pg)'},short:{secs:300,label:'短暂休息',color:'#10b981'},long:{secs:900,label:'长时休息',color:'#3b82f6'}};
let pMode='work',pLeft=1500,pRunning=false,pTimer=null,pCycles=+(ls('pCycles')||0),CIRC=464.96;
function initPomo(){document.getElementById('pomoCycles').textContent=pCycles;updatePomoUI();}
window.setPomoMode=function(m){if(pRunning)return;pMode=m;pLeft=PM[m].secs;document.querySelectorAll('.pomo-mode').forEach(b=>b.classList.remove('on'));document.getElementById('pm-'+m).classList.add('on');updatePomoUI();};
window.togglePomo=function(){
    if(pRunning){clearInterval(pTimer);pRunning=false;document.getElementById('pomoStartBtn').textContent='▶ 继续';}
    else{pRunning=true;document.getElementById('pomoStartBtn').textContent='⏸ 暂停';pTimer=setInterval(()=>{
        if(pLeft<=0){clearInterval(pTimer);pRunning=false;document.getElementById('pomoStartBtn').textContent='▶ 开始';
            if(pMode==='work'){pCycles++;lss('pCycles',pCycles);document.getElementById('pomoCycles').textContent=pCycles;}
            toast(pMode==='work'?'🍅 专注完成！好好休息一下':'✅ 休息结束，继续加油！');return;}
        pLeft--;updatePomoUI();
    },1000);}
};
window.resetPomo=function(){clearInterval(pTimer);pRunning=false;pLeft=PM[pMode].secs;document.getElementById('pomoStartBtn').textContent='▶ 开始';updatePomoUI();};
function updatePomoUI(){
    const m=String(Math.floor(pLeft/60)).padStart(2,'0'),s=String(pLeft%60).padStart(2,'0');
    document.getElementById('pomoTime').textContent=`${m}:${s}`;
    document.getElementById('pomoLabel').textContent=PM[pMode].label;
    const ring=document.getElementById('pomoRing');
    ring.style.strokeDashoffset=CIRC*(pLeft/PM[pMode].secs);
    ring.style.stroke=PM[pMode].color;
}

// BOOKMARKS
let bookmarks=[];
function initBookmarks(){bookmarks=JSON.parse(ls('bookmarks')||'[]');renderBookmarks();}
window.addBookmark=function(){
    const name=document.getElementById('bmName').value.trim();
    let url=document.getElementById('bmUrl').value.trim();
    if(!name||!url)return toast('⚠️ 请填写名称和网址');
    if(!/^https?:\/\//i.test(url))url='https://'+url;
    bookmarks.unshift({id:Date.now(),name,url});
    document.getElementById('bmName').value='';document.getElementById('bmUrl').value='';
    lss('bookmarks',JSON.stringify(bookmarks));renderBookmarks();toast(`🔖 已收藏：${name}`);
};
window.delBookmark=function(id){bookmarks=bookmarks.filter(b=>b.id!==id);lss('bookmarks',JSON.stringify(bookmarks));renderBookmarks();};
function renderBookmarks(){
    const list=document.getElementById('bmList');
    if(!bookmarks.length){list.innerHTML=`<div class="bm-empty">还没有收藏～<br>添加你常用的网站吧 👆</div>`;return;}
    list.innerHTML=bookmarks.map(b=>{
        let ico='🔗';try{const d=new URL(b.url).hostname;ico=`<img src="https://www.google.com/s2/favicons?domain=${d}&sz=64" onerror="this.outerHTML='🔗'" alt="" loading="lazy">`;}catch{}
        return `<a href="${b.url}" target="_blank" rel="noopener noreferrer" class="bm-item"><div class="bm-ico">${ico}</div><div class="bm-info"><div class="bm-name">${escH(b.name)}</div><div class="bm-url">${b.url}</div></div><button class="bm-del" onclick="event.preventDefault();delBookmark(${b.id})">✕</button></a>`;
    }).join('');
}

// Utils
window.goTop=()=>window.scrollTo({top:0,behavior:'smooth'});
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2400);}
function ls(k){try{return localStorage.getItem(k);}catch{return null;}}
function lss(k,v){try{localStorage.setItem(k,v);}catch{}}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── PWA ──────────────────────────────────────────────
// Service Worker
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// URL shortcut open tool
(function(){
    const p=new URLSearchParams(location.search).get('tool');
    if(p) setTimeout(()=>openToolbox(p),300);
})();

// Install prompt
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    deferredPrompt=e;
    if(!ls('install-dismissed')){
        setTimeout(()=>document.getElementById('installBanner').classList.add('show'),2000);
    }
});
document.getElementById('installBtn').addEventListener('click',async()=>{
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    const{outcome}=await deferredPrompt.userChoice;
    deferredPrompt=null;
    document.getElementById('installBanner').classList.remove('show');
    if(outcome==='accepted') toast('🎉 智航 Pro 已安装到桌面！');
});
window.dismissInstall=function(){
    document.getElementById('installBanner').classList.remove('show');
    lss('install-dismissed','1');
};
window.addEventListener('appinstalled',()=>{
    document.getElementById('installBanner').classList.remove('show');
    toast('✅ 安装成功！可从桌面启动智航 Pro');
});
</script>
