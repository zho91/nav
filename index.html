        :root {
            --primary: #8b5cf6;

            --bg: #030712;
            --card-bg: rgba(31, 41, 55, 0.4);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --glass: blur(16px) saturate(180%);

        body {
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            color: var(--text-main);
            line-height: 1.5;
        }

        .top-bar {
            padding: 20px 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        #clock { font-size: 14px; font-weight: 500; color: var(--text-dim); }
        #date-str { font-size: 12px; color: var(--text-dim); opacity: 0.7; }

        .header { text-align:center; padding: 24px 20px 10px; }
        .header h1 {
            font-size: 32px; font-weight: 800;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .header p { font-size: 13px; color: var(--text-dim); }

        .search-container {
            position: sticky; top: 0; z-index: 100;
            padding: 10px 16px 16px;
            background: linear-gradient(to bottom, var(--bg) 60%, transparent);
            backdrop-filter: var(--glass);
        }
        .search-wrap { max-width: 650px; margin: 0 auto; position: relative; }
        .search-wrap input {
            width:100%; background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 14px 15px 14px 45px;
            color: white; font-size: 16px; outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 25px var(--primary-glow);
            background: rgba(17, 24, 39, 1);
            transform: translateY(-1px);
        }
        .search-engine-bar {
            max-width: 650px; margin: 8px auto 0;
            display: flex; gap: 8px; justify-content: center;
        }
        .se-btn {
            font-size: 12px; padding: 4px 12px; border-radius: 8px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-dim); cursor: pointer; transition: 0.2s;
        }
        .se-btn.active, .se-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); opacity: 0.6; }

        .pills {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 16px 20px;
            max-width: 1200px; margin: 0 auto;
            scrollbar-width: none;
        }
        .pills::-webkit-scrollbar { display: none; }
        .pill {
            flex-shrink: 0; padding: 8px 18px; border-radius: 12px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-dim); transition: 0.3s;
        }
        .pill.active { background: var(--primary); color: white; box-shadow: 0 4px 15px var(--primary-glow); }

        .main-content { max-width: 1200px; margin: 0 auto; padding: 0 16px 100px; }
        .section-title { font-size: 13px; color: var(--primary); font-weight: 700; margin: 28px 0 14px 4px; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }

        .site-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px; padding: 16px; text-decoration: none;
            display: flex; flex-direction: column; align-items: flex-start;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .site-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 60%, rgba(139,92,246,0.06));
            opacity: 0; transition: 0.35s;
        }
        .site-card:hover::before { opacity: 1; }
        .site-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(139,92,246,0.5);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }
        .site-icon {
            width: 44px; height: 44px; background: rgba(255,255,255,0.05);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 22px; margin-bottom: 12px;
        }
        .site-icon img { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; }

        .site-name { color: var(--text-main); font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .site-desc { color: var(--text-dim); font-size: 11px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .tag {
            font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
            position: absolute; top: 10px; right: 10px; letter-spacing: 0.5px;
        }
        .tag-new { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
        .tag-hot { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
        .tag-free { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }

        .hl { color: #f472b6; font-weight: bold; background: rgba(244, 114, 182, 0.1); padding: 0 2px; border-radius: 4px; }

        .stats-bar {
            max-width: 1200px; margin: 0 auto 4px; padding: 0 16px;
            font-size: 12px; color: var(--text-dim); text-align: right;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 26px; }
        }
    </style>

        { name: "什么值得买", url: "https://www.smzdm.com", icon: "💰", desc: "购物优惠精选推荐" },
    ]},
];

let activeCat = "全部";

function init() {
    renderPills();
    renderSites();
    renderSearchEngines();
    startTime();

    const count = categories.reduce((sum, c) => sum + c.sites.length, 0);
    document.getElementById('site-count').textContent = `${count} 个站点`;

    const input = document.getElementById('searchInput');
    input.addEventListener('input', renderSites);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
            window.open(ENGINES[activeEngine].url + encodeURIComponent(input.value.trim()), '_blank');
        }
    });
}

function startTime() {
    const d = new Date();
    document.getElementById('clock').textContent = d.toLocaleTimeString('zh-CN', { hour12: false });
    document.getElementById('date-str').textContent = d.toLocaleDateString('zh-CN', { weekday: 'short', month: 'long', day: 'numeric' });
    setTimeout(startTime, 1000);
}

function renderSearchEngines() {
    document.getElementById('seBar').innerHTML = ENGINES.map((e, i) => `
        <button class="se-btn ${i === activeEngine ? 'active' : ''}" onclick="setEngine(${i})">${e.name}</button>
    `).join('');
}

window.setEngine = (i) => { activeEngine = i; renderSearchEngines(); };

function renderPills() {
    const all = ["全部", ...categories.map(c => c.name)];
    document.getElementById('pills').innerHTML = all.map(n => `
        <button class="pill ${n === activeCat ? 'active' : ''}" onclick="switchCat('${n.replace(/'/g, "\\'")}')">${n}</button>
    `).join('');
}

window.switchCat = (name) => {
    activeCat = name;
    renderPills();
    renderSites();
};

function getIcon(url, emoji) {
    try {
        const domain = new URL(url).hostname;
        return `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64" onerror="this.outerHTML='${emoji}'" alt="">`;
    } catch { return emoji; }
}

function renderSites() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const container = document.getElementById('sitesContainer');

    const filtered = categories.map(cat => ({
        ...cat,
        sites: cat.sites.filter(s =>
            !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q)
        )
    })).filter(cat => cat.sites.length > 0 && (activeCat === "全部" || cat.name === activeCat));

    const totalShown = filtered.reduce((s, c) => s + c.sites.length, 0);
    document.getElementById('statsBar').textContent = q ? `找到 ${totalShown} 个相关站点` : '';

    if (filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:100px;opacity:0.3;">未找到相关站点，回车可直接搜索全网</div>`;
        return;
    }

    const tagMap = { hot: 'tag-hot', new: 'tag-new', free: 'tag-free' };
    const tagLabel = { hot: 'HOT', new: 'NEW', free: 'FREE' };

    container.innerHTML = filtered.map(cat => `
        <div class="section-title">${cat.name}</div>
        <div class="grid">
            ${cat.sites.map(s => {
                const name = q ? s.name.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<em class="hl">$1</em>') : s.name;
                const tagHtml = s.tag ? `<span class="tag ${tagMap[s.tag]}">${tagLabel[s.tag]}</span>` : '';
                return `
                    <a href="${s.url}" target="_blank" rel="noopener" class="site-card">
                        ${tagHtml}
                        <div class="site-icon">${getIcon(s.url, s.icon)}</div>
                        <div class="site-name">${name}</div>
                        <div class="site-desc">${s.desc}</div>
                    </a>
                `;
            }).join('')}
        </div>
    `).join('');
}

init();
</script>
</body>
</html>
