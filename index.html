<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>智航 Pro · 你的高效起点</title>
    <style>
        :root {
            --bg: #060c1a;
            --card: rgba(255,255,255,0.04);
            --card-hov: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.07);
            --border-hov: rgba(139,92,246,0.5);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --blue: #3b82f6;
            --green: #10b981;
            --glow-p: rgba(139,92,246,0.28);
            --glow-pk: rgba(236,72,153,0.2);
            --r: 16px;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

        body{
            background:var(--bg);
            color:var(--text);
            font-family:'Inter',-apple-system,system-ui,sans-serif;
            min-height:100vh;
            overflow-x:hidden;
        }

        /* ── Aurora ── */
        .aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
        .ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:.1;animation:drift 28s infinite ease-in-out;}
        .ab:nth-child(1){width:700px;height:700px;background:radial-gradient(circle,#7c3aed,#4f46e5);top:-200px;left:-150px;animation-duration:32s;}
        .ab:nth-child(2){width:600px;height:600px;background:radial-gradient(circle,#db2777,#be185d);bottom:-150px;right:-150px;animation-duration:38s;animation-delay:-12s;}
        .ab:nth-child(3){width:450px;height:450px;background:radial-gradient(circle,#2563eb,#0ea5e9);top:40%;left:45%;animation-duration:44s;animation-delay:-6s;}
        .ab:nth-child(4){width:300px;height:300px;background:radial-gradient(circle,#059669,#10b981);top:20%;right:20%;animation-duration:36s;animation-delay:-18s;opacity:.07;}
        @keyframes drift{
            0%,100%{transform:translate(0,0) scale(1);}
            25%{transform:translate(60px,40px) scale(1.08);}
            50%{transform:translate(-40px,70px) scale(.94);}
            75%{transform:translate(50px,-40px) scale(1.05);}
        }

        /* dot-grid overlay */
        body::before{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background-image:radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);
            background-size:28px 28px;
        }

        .wrap{position:relative;z-index:1;}

        /* ── Top Bar ── */
        .top-bar{
            display:flex;justify-content:space-between;align-items:center;
            padding:22px 28px 0;max-width:1300px;margin:0 auto;
        }
        .clock-block{}
        .clock{
            font-size:24px;font-weight:800;letter-spacing:3px;
            font-variant-numeric:tabular-nums;
            background:linear-gradient(120deg,#c4b5fd,#f9a8d4,#93c5fd);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        }
        .date-line{font-size:12px;color:var(--muted);margin-top:3px;}
        .greeting-line{font-size:13px;color:var(--muted);text-align:center;}
        .version-badge{
            font-size:11px;padding:4px 10px;border-radius:8px;
            background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.2);
            color:var(--purple);font-weight:700;
        }

        /* ── Header ── */
        .header{text-align:center;padding:28px 24px 16px;}
        .logo{
            font-size:46px;font-weight:900;letter-spacing:-2px;
            background:linear-gradient(135deg,#c4b5fd 0%,#f9a8d4 45%,#93c5fd 90%);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            filter:drop-shadow(0 0 36px rgba(139,92,246,.5));
            line-height:1.1;
        }
        .tagline{font-size:13px;color:var(--muted);margin-top:10px;letter-spacing:2.5px;}
        .stat-chips{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
        .chip{
            font-size:12px;padding:5px 14px;border-radius:20px;
            background:var(--card);border:1px solid var(--border);color:var(--muted);
        }
        .chip b{color:var(--purple);}

        /* ── Search ── */
        .search-sticky{
            position:sticky;top:0;z-index:100;
            padding:12px 24px 14px;
            background:linear-gradient(to bottom,rgba(6,12,26,.97) 65%,transparent);
            backdrop-filter:blur(22px);
        }
        .search-box{max-width:700px;margin:0 auto;}
        .input-wrap{position:relative;}
        .input-wrap input{
            width:100%;
            background:rgba(15,23,42,.85);
            border:1.5px solid var(--border);
            border-radius:20px;
            padding:15px 52px 15px 54px;
            color:var(--text);font-size:16px;outline:none;
            transition:border-color .3s,box-shadow .3s,background .3s;
            font-family:inherit;
        }
        .input-wrap input:focus{
            border-color:var(--purple);
            background:rgba(15,23,42,1);
            box-shadow:0 0 0 4px var(--glow-p),0 10px 36px rgba(0,0,0,.6);
        }
        .input-wrap input::placeholder{color:rgba(148,163,184,.4);}
        .si-left{position:absolute;left:19px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.45;pointer-events:none;}
        .si-clear{
            position:absolute;right:16px;top:50%;transform:translateY(-50%);
            width:28px;height:28px;border-radius:50%;
            background:rgba(255,255,255,.08);border:none;color:var(--muted);
            cursor:pointer;font-size:13px;display:none;align-items:center;justify-content:center;transition:.2s;
        }
        .si-clear.on{display:flex;}
        .si-clear:hover{background:rgba(255,255,255,.18);color:var(--text);}

        .engine-row{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
        .eng-btn{
            font-size:12px;padding:5px 14px;border-radius:9px;
            background:var(--card);border:1px solid var(--border);
            color:var(--muted);cursor:pointer;transition:.2s;font-family:inherit;
        }
        .eng-btn.on{
            background:linear-gradient(135deg,var(--purple),var(--pink));
            color:#fff;border-color:transparent;
            box-shadow:0 2px 14px var(--glow-p);
        }
        .eng-btn:hover:not(.on){border-color:rgba(139,92,246,.4);color:var(--text);}

        /* ── Toolbar ── */
        .toolbar{
            max-width:1300px;margin:0 auto;
            display:flex;justify-content:space-between;align-items:center;
            padding:0 24px 6px;
        }
        .tb-group{display:flex;gap:8px;}
        .tb-btn{
            font-size:12px;padding:6px 14px;border-radius:9px;
            background:var(--card);border:1px solid var(--border);
            color:var(--muted);cursor:pointer;transition:.2s;
            display:flex;align-items:center;gap:5px;font-family:inherit;
        }
        .tb-btn:hover{background:var(--card-hov);color:var(--text);border-color:var(--border-hov);}
        .tb-btn.on{background:rgba(139,92,246,.14);color:var(--purple);border-color:rgba(139,92,246,.35);}

        /* ── Pills ── */
        .pills-wrap{
            max-width:1300px;margin:0 auto;
            padding:4px 24px 18px;overflow-x:auto;scrollbar-width:none;
        }
        .pills-wrap::-webkit-scrollbar{display:none;}
        .pills{display:flex;gap:8px;width:max-content;}
        .pill{
            flex-shrink:0;padding:8px 16px;border-radius:12px;
            font-size:13px;font-weight:600;cursor:pointer;
            background:var(--card);border:1px solid var(--border);
            color:var(--muted);transition:.25s;
            display:flex;align-items:center;gap:7px;font-family:inherit;white-space:nowrap;
        }
        .pill .cnt{
            font-size:10px;font-weight:700;
            background:rgba(255,255,255,.08);padding:1px 6px;border-radius:10px;
        }
        .pill.on{
            background:linear-gradient(135deg,var(--purple),var(--pink));
            color:#fff;border-color:transparent;
            box-shadow:0 4px 22px var(--glow-p);
        }
        .pill.on .cnt{background:rgba(255,255,255,.22);}
        .pill:hover:not(.on){border-color:rgba(139,92,246,.4);color:var(--text);}

        /* ── Stats ── */
        .result-stats{
            max-width:1300px;margin:0 auto 4px;padding:0 24px;
            font-size:12px;color:var(--muted);min-height:18px;
        }

        /* ── Main Grid ── */
        .main{max-width:1300px;margin:0 auto;padding:0 24px 120px;}
        .sec{margin-bottom:6px;}
        .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-top:24px;}
        .sec-title{font-size:12px;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:2px;white-space:nowrap;}
        .sec-line{flex:1;height:1px;background:linear-gradient(to right,rgba(139,92,246,.35),transparent);}
        .sec-cnt{font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:2px 8px;border-radius:10px;flex-shrink:0;}

        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px;margin-bottom:8px;}

        /* List view overrides */
        .list .grid{grid-template-columns:1fr;}
        .list .site-card{flex-direction:row;align-items:center;gap:14px;padding:12px 16px;border-radius:14px;}
        .list .site-icon{margin-bottom:0;flex-shrink:0;}
        .list .site-info{flex:1;min-width:0;}
        .list .site-desc{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;-webkit-line-clamp:unset;}

        /* ── Site Card ── */
        .site-card{
            background:var(--card);border:1px solid var(--border);
            border-radius:18px;padding:16px;text-decoration:none;
            display:flex;flex-direction:column;align-items:flex-start;
            position:relative;overflow:hidden;
            transition:transform .32s cubic-bezier(.175,.885,.32,1.275),
                        background .28s,border-color .28s,box-shadow .28s;
            animation:fadeUp .4s ease both;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

        .site-card::before{
            content:'';position:absolute;inset:0;
            background:linear-gradient(135deg,transparent 50%,rgba(139,92,246,.07));
            opacity:0;transition:.28s;
        }
        .site-card:hover{
            background:var(--card-hov);
            border-color:rgba(139,92,246,.45);
            transform:translateY(-5px) scale(1.015);
            box-shadow:0 16px 44px rgba(0,0,0,.55),0 0 22px var(--glow-p);
        }
        .site-card:hover::before{opacity:1;}

        .site-icon{
            width:46px;height:46px;background:rgba(255,255,255,.06);
            border-radius:13px;display:flex;align-items:center;justify-content:center;
            font-size:22px;margin-bottom:12px;transition:.28s;flex-shrink:0;
        }
        .site-card:hover .site-icon{background:rgba(139,92,246,.18);box-shadow:0 0 14px var(--glow-p);}
        .site-icon img{width:28px;height:28px;object-fit:contain;border-radius:6px;}

        .site-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.3;}
        .site-desc{font-size:11px;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

        /* Tags */
        .stag{
            font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;
            position:absolute;top:10px;right:10px;letter-spacing:.8px;z-index:1;
        }
        .t-hot{background:rgba(239,68,68,.18);color:#f87171;border:1px solid rgba(248,113,113,.25);}
        .t-new{background:rgba(16,185,129,.18);color:#34d399;border:1px solid rgba(52,211,153,.25);}
        .t-free{background:rgba(59,130,246,.18);color:#60a5fa;border:1px solid rgba(96,165,250,.25);}

        /* Search highlight */
        em.hl{font-style:normal;color:#f472b6;background:rgba(244,114,182,.12);padding:0 2px;border-radius:3px;}

        /* Empty */
        .empty{text-align:center;padding:80px 24px;color:var(--muted);}
        .empty .big{font-size:52px;margin-bottom:14px;}

        /* ── FAB ── */
        .fab-wrap{position:fixed;bottom:28px;right:26px;display:flex;flex-direction:column;gap:10px;z-index:200;}
        .fab{
            width:46px;height:46px;border-radius:14px;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;font-size:18px;transition:.22s;
            box-shadow:0 4px 22px rgba(0,0,0,.45);
        }
        .fab-main{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;}
        .fab-main:hover{transform:scale(1.12);box-shadow:0 8px 32px var(--glow-p);}

        /* ── Keyboard hint ── */
        .kbd-hint{
            position:fixed;bottom:28px;left:26px;
            font-size:11px;color:var(--muted);
            background:rgba(15,23,42,.85);border:1px solid var(--border);
            padding:6px 13px;border-radius:10px;backdrop-filter:blur(14px);z-index:200;
        }
        kbd{font-size:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:1px 5px;border-radius:4px;font-family:monospace;margin:0 2px;}

        /* ── Toast ── */
        .toast{
            position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-90px);
            background:rgba(15,23,42,.96);border:1px solid var(--border);
            padding:10px 22px;border-radius:13px;font-size:13px;color:var(--text);
            backdrop-filter:blur(16px);transition:transform .32s cubic-bezier(.34,1.56,.64,1);
            z-index:9999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);
        }
        .toast.on{transform:translateX(-50%) translateY(0);}

        /* ── Responsive ── */
        @media(max-width:640px){
            .grid{grid-template-columns:repeat(2,1fr);}
            .logo{font-size:34px;}
            .kbd-hint{display:none;}
            .top-bar,.search-sticky,.main,.pills-wrap,.toolbar{padding-left:16px;padding-right:16px;}
            .header{padding:20px 16px 14px;}
        }
    </style>
</head>

// ── State ──────────────────────────────────────────────────────────────────
let activeCat    = localStorage.getItem('nc') || "全部";
let activeEngine = +(localStorage.getItem('ne') || 0);
let isListView   = localStorage.getItem('nv') === '1';

// ── Boot ──────────────────────────────────────────────────────────────────
(function init() {
    const total = CATS.reduce((s,c)=>s+c.sites.length,0);
    document.getElementById('catN').textContent = CATS.length;
    document.getElementById('siteN').textContent = total;

    renderEngines();
    renderPills();
    applyView();
    renderSites();
    startClock();

    const inp = document.getElementById('q');
    inp.addEventListener('input', () => {
        document.getElementById('clrBtn').classList.toggle('on', inp.value.length > 0);
        renderSites();
    });
    inp.addEventListener('keydown', e => {
        if (e.key === 'Enter' && inp.value.trim())
            window.open(ENGINES[activeEngine].u + encodeURIComponent(inp.value.trim()), '_blank');
    });
    document.addEventListener('keydown', e => {
        if (e.key === '/' && document.activeElement !== inp) { e.preventDefault(); inp.focus(); }
        if (e.key === 'Escape') { clearQ(); inp.blur(); }
    });
})();

// ── Clock ──────────────────────────────────────────────────────────────────
function startClock() {
    const GR = ['🌙夜深了','🌙夜深了','🌙夜深了','🌙夜深了','🌙夜深了','🌙夜深了',
                '🌅早上好','🌅早上好','☀️上午好','☀️上午好','☀️上午好','☀️上午好',
                '🌤️中午好','🌤️下午好','🌤️下午好','🌤️下午好','🌤️下午好','🌤️下午好',
                '🌆傍晚好','🌆傍晚好','🌃晚上好','🌃晚上好','🌃晚上好','🌙夜深了'];
    const DAY = ['周日','周一','周二','周三','周四','周五','周六'];
    (function tick() {
        const d = new Date();
        document.getElementById('clock').textContent = d.toLocaleTimeString('zh-CN',{hour12:false});
        document.getElementById('dateLine').textContent =
            `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${DAY[d.getDay()]}`;
        document.getElementById('greeting').textContent = GR[d.getHours()];
        setTimeout(tick, 1000);
    })();
}

// ── Engines ──────────────────────────────────────────────────────────────────
function renderEngines() {
    document.getElementById('engRow').innerHTML = ENGINES.map((e,i)=>
        `<button class="eng-btn ${i===activeEngine?'on':''}" onclick="setEng(${i})">${e.n}</button>`
    ).join('');
}
window.setEng = i => { activeEngine=i; localStorage.setItem('ne',i); renderEngines(); };

// ── Pills ──────────────────────────────────────────────────────────────────
function renderPills() {
    const allN = CATS.reduce((s,c)=>s+c.sites.length,0);
    const items = [{name:"全部",cnt:allN}, ...CATS.map(c=>({name:c.name,cnt:c.sites.length}))];
    document.getElementById('pills').innerHTML = items.map(p=>`
        <button class="pill ${p.name===activeCat?'on':''}" onclick="setCat('${p.name.replace(/'/g,"\\'")}')">
            ${p.name}<span class="cnt">${p.cnt}</span>
        </button>`
    ).join('');
}
window.setCat = n => { activeCat=n; localStorage.setItem('nc',n); renderPills(); renderSites(); };

// ── View ──────────────────────────────────────────────────────────────────
function applyView() {
    const btn = document.getElementById('viewBtn');
    document.getElementById('main').classList.toggle('list', isListView);
    btn.textContent = isListView ? '⊞ 网格' : '☰ 列表';
    btn.classList.toggle('on', isListView);
}
window.toggleView = () => { isListView=!isListView; localStorage.setItem('nv',isListView?'1':''); applyView(); };

// ── Random ──────────────────────────────────────────────────────────────────
window.randomSite = () => {
    const all = CATS.flatMap(c=>c.sites);
    const s = all[Math.floor(Math.random()*all.length)];
    toast(`🎲 随机跳转：${s.n}`);
    setTimeout(()=>window.open(s.u,'_blank'), 600);
};

// ── Search ──────────────────────────────────────────────────────────────────
window.clearQ = () => {
    const inp = document.getElementById('q');
    inp.value = '';
    document.getElementById('clrBtn').classList.remove('on');
    renderSites();
};

function favicon(url, emoji) {
    try {
        const d = new URL(url).hostname;
        return `<img src="https://www.google.com/s2/favicons?domain=${d}&sz=64" onerror="this.outerHTML='${emoji}'" alt="" loading="lazy">`;
    } catch { return emoji; }
}

function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

const TCLS = { hot:'t-hot', new:'t-new', free:'t-free' };
const TLBL = { hot:'HOT', new:'NEW', free:'FREE' };

function renderSites() {
    const q = document.getElementById('q').value.trim().toLowerCase();
    const main = document.getElementById('main');

    const filtered = CATS
        .map(c=>({...c, sites:c.sites.filter(s=>!q||s.n.toLowerCase().includes(q)||s.d.toLowerCase().includes(q))}))
        .filter(c=>c.sites.length>0 && (activeCat==="全部"||c.name===activeCat));

    const total = filtered.reduce((s,c)=>s+c.sites.length,0);
    document.getElementById('rstats').textContent = q ? `找到 ${total} 个匹配站点` : '';

    if (!filtered.length) {
        main.innerHTML = `<div class="empty"><div class="big">🔍</div>没有找到「${q}」相关站点<br><small style="margin-top:10px;display:block;font-size:13px;">按 Enter 直接搜索全网</small></div>`;
        return;
    }

    main.innerHTML = filtered.map((cat, ci) => `
        <div class="sec">
            <div class="sec-head">
                <div class="sec-title">${cat.name}</div>
                <div class="sec-line"></div>
                <div class="sec-cnt">${cat.sites.length}</div>
            </div>
            <div class="grid">
                ${cat.sites.map((s,si) => {
                    const delay = (ci*3+si)*18;
                    const nm = q ? s.n.replace(new RegExp(`(${esc(q)})`,'gi'),'<em class="hl">$1</em>') : s.n;
                    const tag = s.t ? `<span class="stag ${TCLS[s.t]||'t-new'}">${TLBL[s.t]||s.t.toUpperCase()}</span>` : '';
                    return `<a href="${s.u}" target="_blank" rel="noopener noreferrer" class="site-card" style="animation-delay:${delay}ms">
                        ${tag}
                        <div class="site-icon">${favicon(s.u, s.e)}</div>
                        <div class="site-info">
                            <div class="site-name">${nm}</div>
                            <div class="site-desc">${s.d}</div>
                        </div>
                    </a>`;
                }).join('')}
            </div>
        </div>`
    ).join('');
}

// ── Utils ──────────────────────────────────────────────────────────────────
window.goTop = () => window.scrollTo({top:0,behavior:'smooth'});

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('on');
    clearTimeout(t._t);
    t._t = setTimeout(()=>t.classList.remove('on'), 2400);
}
